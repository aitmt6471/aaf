<!-- 사양표 -->
<style>
  #spec-bom-modal, #spec-bom-modal *,
  .tab-toolbar, .tab-toolbar *,
  #spec-tab-orders, #spec-tab-catalog, #spec-tab-reverse,
  #spec-date-header, #spec-date-header *,
  #spec-table-panel, #spec-table-panel *,
  #spec-reverse-panel, #spec-reverse-panel * {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif !important;
  }
</style>
<div class="tab-toolbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:23px;font-weight:900;color:#1e3264;letter-spacing:2px">사양표</span>
    <div style="width:1px;height:16px;background:var(--border)"></div>
    <span id="spec-rev-badge" style="font-size:13px;font-weight:700;color:#111827">Rev. 0</span>
    <span id="spec-rev-date" style="font-size:13px;color:#374151">개정일: -</span>
    <button class="btn btn-ghost btn-sm" onclick="openRevModal('spec')">이력</button>
  </div>
  <div style="flex:1"></div>
  <button class="btn btn-primary btn-sm edit-only" id="spec-save-btn" onclick="saveDocument('spec')">&#x1F4BE; 저장</button>
  <button class="btn btn-ghost btn-sm" id="spec-edit-btn" onclick="specToggleEdit(this)">&#x270F; 편집 모드</button>
</div>

<div style="display:flex;flex-direction:column;height:calc(100vh - 100px);overflow:hidden">

  <!-- 내부 탭 -->
  <div style="display:flex;background:#f0f4fa;border-bottom:2px solid #c9d4e8;flex-shrink:0">
    <button id="spec-tab-orders"  onclick="specSwitchTab('orders')"  style="padding:8px 18px;font-size:20px;font-weight:600;border:none;background:#1e3264;color:#fff;cursor:pointer;border-right:1px solid #c9d4e8">작업지시</button>
    <button id="spec-tab-catalog" onclick="specSwitchTab('catalog')" style="padding:8px 18px;font-size:20px;font-weight:600;border:none;background:transparent;color:#374151;cursor:pointer;border-right:1px solid #c9d4e8">전체 리스트</button>
    <button id="spec-tab-reverse" onclick="specSwitchTab('reverse')" style="padding:8px 18px;font-size:20px;font-weight:600;border:none;background:transparent;color:#374151;cursor:pointer">자재 역추적</button>
  </div>

  <!-- 날짜 선택 (파란 헤더 — 작업지시 탭만 표시) -->
  <div id="spec-date-header" style="background:#1e3264;flex-shrink:0">
    <div style="padding:10px 16px;display:flex;align-items:center;gap:10px">
      <button class="btn btn-ghost btn-sm" onclick="prevMonth('spec');specRenderDayPicker()"
        style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x2039;</button>
      <span id="spec-month-label" style="font-weight:700;font-size:22px;min-width:90px;text-align:center;color:#fff"></span>
      <button class="btn btn-ghost btn-sm" onclick="nextMonth('spec');specRenderDayPicker()"
        style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x203A;</button>
      <span style="color:rgba(255,255,255,.35);margin:0 4px">|</span>
      <span id="spec-sel-date" style="font-size:21px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);padding:3px 12px;border-radius:6px;letter-spacing:.5px">날짜 선택</span>
      <div style="flex:1"></div>
      <span id="spec-car-badge" style="font-size:19px;color:rgba(255,255,255,.65);padding:2px 8px;border:1px solid rgba(255,255,255,.25);border-radius:4px"></span>
    </div>
    <div style="padding:10px 16px;border-top:1px solid rgba(255,255,255,.1)">
      <div id="spec-day-picker" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>

  <!-- 메인 바디 -->
  <div style="display:flex;flex:1;min-height:0">

    <!-- 작업지시 / 전체 리스트 패널 -->
    <div id="spec-table-panel" style="flex:1;min-width:0;display:flex;flex-direction:column;background:#fff">
      <div style="padding:6px 10px;border-bottom:1px solid #e5e7eb;background:#f8fafc;flex-shrink:0;display:flex;align-items:center;gap:6px">
        <input id="spec-search" type="text" placeholder="도번 / 옵션명 검색..." oninput="specFilterTable()"
          style="flex:1;padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:20px;outline:none">
        <span id="spec-count-badge" style="font-size:19px;color:#6b7280;white-space:nowrap"></span>
      </div>
      <div id="spec-table-wrap" style="flex:1;overflow-y:auto">
        <div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">로딩 중...</div>
      </div>
    </div>

    <!-- 자재 역추적 패널 -->
    <div id="spec-reverse-panel" style="display:none;flex:1;min-width:0;flex-direction:column;background:#fff">
      <div style="padding:8px 12px;border-bottom:1px solid #e5e7eb;background:#f8fafc;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;position:relative">
            <input id="spec-reverse-search" type="text" placeholder="자재 품번 일부 입력 후 선택..."
              autocomplete="off"
              oninput="specReverseSuggest()"
              onkeydown="if(event.key==='Enter'){specHideSuggest();specReverseSearch();}if(event.key==='Escape')specHideSuggest();if(event.key==='ArrowDown'){event.preventDefault();specSuggestFocus(1);}if(event.key==='ArrowUp'){event.preventDefault();specSuggestFocus(-1);}"
              style="width:100%;box-sizing:border-box;padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:20px;outline:none">
            <div id="spec-reverse-suggest"
              style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:200;
                     background:#fff;border:1px solid #c9d4e8;border-radius:6px;
                     box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:300px;overflow-y:auto"></div>
          </div>
          <button onclick="specHideSuggest();specReverseSearch()" style="padding:5px 12px;background:#1e3264;color:#fff;border:none;border-radius:6px;font-size:20px;cursor:pointer;white-space:nowrap">조회</button>
          <span id="spec-reverse-badge" style="font-size:19px;color:#6b7280;white-space:nowrap"></span>
        </div>
        <div id="spec-reverse-partname" style="display:none;margin-top:5px;font-size:20px;color:#1e3264;font-weight:600;padding:0 2px"></div>
      </div>
      <div id="spec-reverse-wrap" style="flex:1;overflow-y:auto">
        <div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">자재 품번을 입력하면 해당 부품이 사용되는 완제품 목록을 보여줍니다</div>
      </div>
    </div>

  </div>
</div>

<!-- 부품 사진 모달 -->
<div id="spec-bom-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:90vw;max-width:1100px;height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <!-- 모달 헤더 -->
    <div style="background:#1e3264;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div style="flex:1">
        <div id="spec-modal-title" style="font-size:22px;font-weight:700;font-family:monospace"></div>
        <div id="spec-modal-sub" style="font-size:19px;color:rgba(255,255,255,.6);margin-top:2px"></div>
      </div>
      <button id="spec-modal-edit-btn" onclick="specModalToggleEdit(this)"
        style="padding:5px 12px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:transparent;color:#fff;font-size:19px;cursor:pointer">✏ 편집</button>
      <button id="spec-modal-save-btn" onclick="specSaveBomChanges()"
        style="display:none;padding:5px 14px;border:none;border-radius:6px;background:#22c55e;color:#fff;font-size:19px;font-weight:600;cursor:pointer">저장</button>
      <button onclick="specCloseModal()"
        style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1">✕</button>
    </div>
    <!-- 모달 바디 -->
    <div id="spec-modal-body" style="flex:1;overflow-y:auto;padding:16px;background:#f8fafc">
      <div style="text-align:center;color:#9ca3af;padding:40px">로드 중...</div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

let _specDay = null;
let _specEditMode = false;
let _specCatalog = [];       // full product list from spec_bom
let _specMesMap = {};        // part_no → {qt_order, no_mmmo, nm_item, cd_item}
let _specSearchQ = '';
let _specSelectedPartNo = null;
let _specPhotosData = [];
let _specBomData = [];
let _specUploading = false;
let _specLinePartNos = null; // Set of part_nos on selected line
let _specTab = 'orders';    // 'orders' | 'catalog' | 'reverse'
let _specMesLoaded = false;
let _specItemNames = {};    // part_no → nm_item (MSSQL item master, date-independent)
let _specDriveIndex = {};  // sub_part_no → Google Drive fileId (from Drive folder listing)
let _specBomDeleted = new Set(); // sub_part_no pending deletion

// keep backward-compat alias
let _specMasterItems = [];
let _specSelectedCdItem = null;

/* ── 한국 공휴일 ── */
const KR_FIXED = ['1-1','3-1','5-5','6-6','8-15','10-3','10-9','12-25'];
const KR_EXTRA = {
  2025:['1-27','1-28','1-29','3-3','10-5','10-6','10-7','10-8'],
  2026:['2-16','2-17','2-18','3-2','6-3','8-17','9-25','9-26','9-27','9-28','9-29','10-5']
};
const KR_NO_SUB = { 2026:['6-8'] }; // 자동계산 대체공휴일 제외 (지방선거로 인해 미지정)
const _subCache = {};
function _calcSubs(year){
  const s=new Set();
  [[1,1],[3,1],[5,5],[6,6],[8,15],[10,3],[10,9],[12,25]].forEach(([mo,da])=>{
    const dow=new Date(year,mo-1,da).getDay();
    let off=0; if(dow===0)off=1; else if(dow===6)off=2;
    if(off){const d=new Date(year,mo-1,da+off);s.add(`${d.getMonth()+1}-${d.getDate()}`);}
  });
  return s;
}
function _isHol(year,month,d){
  if(new Date(year,month-1,d).getDay()===0) return true;
  const md=`${month}-${d}`;
  if(KR_FIXED.includes(md)) return true;
  const ex=KR_EXTRA[year]; if(ex&&ex.includes(md)) return true;
  if(!_subCache[year])_subCache[year]=_calcSubs(year);
  const noSub = KR_NO_SUB[year] || [];
  return _subCache[year].has(md) && !noSub.includes(md);
}

function _getCarModel(){
  return typeof getCurrentCar === 'function' ? getCurrentCar() : '';
}

function _getCarLineName(){
  const car = typeof getCurrentCar === 'function' ? getCurrentCar() : '';
  if (car && typeof _cpMetaGet === 'function') {
    const ln = (_cpMetaGet(car) || {}).linename;
    if (ln) return ln;
  }
  const sel = document.getElementById('car-sel');
  return sel?.options[sel?.selectedIndex]?.dataset?.linename || '';
}

const _PART_TYPE_MAP = {
  '92800': {label:'OHCL NRF',     color:'#1e3264', bg:'#dbeafe'},
  '92810': {label:'OHCL SRF',     color:'#065f46', bg:'#d1fae5'},
  '92850': {label:'ROOM',         color:'#7c2d12', bg:'#fef3c7'},
  '928A1': {label:'LAMP NRF',     color:'#5b21b6', bg:'#ede9fe'},
  '928A2': {label:'LAMP NRF',     color:'#0c4a6e', bg:'#e0f2fe'},
  '928B1': {label:'LAMP SRF',     color:'#9a3412', bg:'#ffedd5'},
  '928B2': {label:'LAMP SRF디지', color:'#7f1d1d', bg:'#fee2e2'},
  '928C2': {label:'LAMP SRF',     color:'#374151', bg:'#f3f4f6'},
  '928D2': {label:'LAMP VRF',     color:'#0f766e', bg:'#ccfbf1'},
};

// 색상코드별 고유 스타일 (작업자가 한눈에 구분할 수 있도록)
const _COLOR_STYLE_MAP = {
  'YGU': {bg:'#fef08a', color:'#713f12'},  // 노란색
  'YUB': {bg:'#f9a8d4', color:'#831843'},  // 핑크색
  'NNB': {bg:'#93c5fd', color:'#1e3a8a'},  // 파란색
  'MDE': {bg:'#86efac', color:'#14532d'},  // 초록색
  'VKN': {bg:'#fca5a5', color:'#7f1d1d'},  // 빨간색
  'SOS': {bg:'#c4b5fd', color:'#4c1d95'},  // 보라색
  'RZP': {bg:'#fdba74', color:'#7c2d12'},  // 주황색
  'NM5': {bg:'#67e8f9', color:'#164e63'},  // 하늘색
  'TS5': {bg:'#6ee7b7', color:'#064e3b'},  // 에메랄드
};
function _colorBadge(code){
  if(!code||code==='미분류') return '';
  const s=_COLOR_STYLE_MAP[code]||{bg:'#e5e7eb',color:'#374151'};
  return `<span style="margin-left:5px;padding:2px 8px;background:${s.bg};color:${s.color};border-radius:3px;font-size:14px;font-family:sans-serif;font-weight:800;letter-spacing:0.5px">${code}</span>`;
}
function _partTypeBadge(partNo){
  const prefix=(partNo||'').split('-')[0];
  const t=_PART_TYPE_MAP[prefix];
  if(!t) return '';
  return `<span style="display:inline-block;padding:1px 5px;border-radius:3px;font-size:18px;font-weight:600;background:${t.bg};color:${t.color};white-space:nowrap">${t.label}</span>`;
}

function _fmtDate(y,m,d){ return `${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`; }

/* ── Day picker ── */
window.specRenderDayPicker = function(){
  const m=getTabMonth('spec');
  const days=new Date(m.year,m.month,0).getDate();
  const picker=document.getElementById('spec-day-picker');
  if(!picker) return;
  const ml=document.getElementById('spec-month-label');
  if(ml) ml.textContent=`${m.year}년 ${m.month}월`;
  picker.innerHTML=Array.from({length:days},(_,i)=>{
    const d=i+1, dow=new Date(m.year,m.month-1,d).getDay();
    const isSat=dow===6, isHol=_isHol(m.year,m.month,d), isAct=d===_specDay;
    if(isHol||isSat){
      const col=isSat?'#f87171':'#f9a8d4';
      const sel=isAct?'outline:2px solid #f87171;outline-offset:1px;':'';
      return `<button onclick="window._specSelDay(${d})"
        style="min-width:30px;height:30px;padding:0 4px;border:1px solid #fecdd3;border-radius:6px;
        background:#fff0f3;color:${col};font-size:19px;font-weight:600;cursor:pointer;${sel}">${d}</button>`;
    }
    const bg=isAct?'var(--primary)':'#fff', col=isAct?'#fff':'var(--text)', bdr=isAct?'var(--primary)':'var(--border)';
    return `<button onclick="window._specSelDay(${d})"
      style="min-width:30px;height:30px;padding:0 4px;border:1px solid ${bdr};border-radius:6px;
      background:${bg};color:${col};font-size:19px;font-weight:600;cursor:pointer">${d}</button>`;
  }).join('');
};

window._specSelDay = function(d){
  _specDay=d;
  _specMesLoaded=false;
  if(_specTab!=='orders') specSwitchTab('orders');
  const m=getTabMonth('spec');
  const el=document.getElementById('spec-sel-date');
  if(el) el.textContent=`${m.year}.${String(m.month).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
  specRenderDayPicker();
  specLoadMes(_fmtDate(m.year,m.month,d));
};

/* ── 카탈로그 초기 로드 (최초 1회) ── */
async function specLoadCatalog(){
  try{
    const [rows, namesRes, driveRes] = await Promise.all([
      AIT_API.getSpecCatalog(),
      AIT_API.getSpecItemNames().catch(()=>null),
      AIT_API.getSpecDriveIndex().catch(()=>null)
    ]);
    _specCatalog=Array.isArray(rows)?rows:[];
    if(namesRes){
      const raw=Array.isArray(namesRes)?namesRes[0]:namesRes;
      _specItemNames=(raw&&raw.names)||{};
    }
    if(driveRes){
      const raw=Array.isArray(driveRes)?driveRes[0]:driveRes;
      _specDriveIndex=(raw&&raw.index)||{};
    }
    specRenderTable();
  }catch(e){
    const wrap=document.getElementById('spec-table-wrap');
    if(wrap) wrap.innerHTML=`<div style="padding:30px;text-align:center;color:#ef4444;font-size:21px">카탈로그 로드 실패: ${e.message}</div>`;
  }
}

/* ── MES 작업지시 로드 (날짜 선택 시) ── */
async function specLoadMes(dateStr){
  const carModel=_getCarModel();
  const lineName=_getCarLineName();
  const badge=document.getElementById('spec-car-badge');
  if(badge) badge.textContent=lineName?(carModel+' · '+lineName):(carModel||'전체 차종');

  _specMesLoaded=false;
  specRenderTable(); // 로딩 중 표시

  // 라인 제품 목록 로드 (선택 날짜 기준 생산시작예정일 매칭)
  if(lineName && dateStr){
    AIT_API.getSpecLineProducts(lineName,dateStr).then(res=>{
      const raw=Array.isArray(res)?res[0]:res;
      const list=(raw&&raw.partNos)||[];
      _specLinePartNos=list.length>0?new Set(list):null;
      specRenderTable();
    }).catch(()=>{_specLinePartNos=null;specRenderTable();});
  }else{
    _specLinePartNos=null;
  }

  try{
    const res=await AIT_API.getSpecMes(dateStr,carModel,lineName); // lineName 우선, 없으면 carModel fallback (n8n에서 처리)
    // 응답 형식: [{data:[...]}] | {data:[...]} | [...] 모두 처리
    const payload=Array.isArray(res)?res[0]:res;
    const items=Array.isArray(payload)?payload:((payload&&payload.data)||[]);
    console.log('[specMES]',dateStr,'car:',carModel,'line:',lineName,'→ items:',items.length, items[0]||'(없음)');
    _specMesMap={};
    items.forEach(r=>{
      if(!r.part_no) return;
      // 중복 색상코드 제거 (예: 92850-N1500NM5NM5 → 92850-N1500NM5)
      const pn=r.part_no.replace(/([A-Z0-9]{3})\1$/,'$1');
      const nr=pn!==r.part_no?{...r,part_no:pn}:r;
      _specMesMap[pn]=nr;
      // 카탈로그는 색상코드 없는 기본 품번 사용 (예: 92850-N1500NM5 → 92850-N1500)
      const base=pn.replace(/[A-Z]{2}[A-Z0-9]$/,'');
      if(base && base!==pn && !_specMesMap[base]) _specMesMap[base]=nr;
    });
    _specMesLoaded=true;
    specRenderTable();
  }catch(e){
    _specMesMap={};
    _specMesLoaded=true;
    specRenderTable();
  }
}

/* ── 탭 전환 ── */
window.specSwitchTab=function(tab){
  _specTab=tab;
  const tabs=['orders','catalog','reverse'];
  tabs.forEach(t=>{
    const btn=document.getElementById(`spec-tab-${t}`);
    if(btn){btn.style.background=t===tab?'#1e3264':'transparent';btn.style.color=t===tab?'#fff':'#374151';}
  });
  const dateHdr=document.getElementById('spec-date-header');
  if(dateHdr) dateHdr.style.display=tab==='orders'?'':'none';
  const tablePanel=document.getElementById('spec-table-panel');
  const reversePanel=document.getElementById('spec-reverse-panel');
  if(tablePanel) tablePanel.style.display=tab==='reverse'?'none':'flex';
  if(reversePanel) reversePanel.style.display=tab==='reverse'?'flex':'none';
  if(tab!=='reverse') specRenderTable();
  else{
    const w=document.getElementById('spec-reverse-wrap');
    if(w) w.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">자재 품번을 입력하면 해당 부품이 사용되는 완제품 목록을 보여줍니다</div>';
  }
};

/* ── 검색 필터 ── */
window.specFilterTable=function(){
  _specSearchQ=(document.getElementById('spec-search')?.value||'').toLowerCase().trim();
  specRenderTable();
};

/* ── 자재 품번 자동완성 ── */
let _specSuggestTimer=null;
let _specSuggestIdx=-1;

window.specReverseSuggest=function(){
  const q=(document.getElementById('spec-reverse-search')?.value||'').trim();
  const drop=document.getElementById('spec-reverse-suggest');
  if(!drop) return;
  clearTimeout(_specSuggestTimer);
  _specSuggestIdx=-1;
  if(q.length<2){drop.style.display='none';return;}
  drop.innerHTML='<div style="padding:10px 14px;color:#9ca3af;font-size:19px">검색 중...</div>';
  drop.style.display='';
  _specSuggestTimer=setTimeout(async()=>{
    try{
      const rows=await AIT_API.getSpecBomSuggest(q);
      const list=Array.isArray(rows)?rows:[];
      if(!list.length){drop.innerHTML='<div style="padding:10px 14px;color:#9ca3af;font-size:19px">일치하는 품번 없음</div>';return;}
      drop.innerHTML=list.map((r,i)=>`
        <div data-idx="${i}" data-pno="${r.sub_part_no}"
          onmousedown="specPickSuggest('${r.sub_part_no.replace(/'/g,"\\'")}')"
          onmouseover="specSuggestHover(${i})"
          style="padding:8px 14px;cursor:pointer;border-bottom:1px solid #f0f4fa;display:flex;align-items:baseline;gap:8px">
          <span style="font-family:monospace;font-size:20px;font-weight:700;color:#1e3264">${r.sub_part_no}</span>
          ${r.sub_part_name?`<span style="font-size:18px;color:#6b7280">${r.sub_part_name}</span>`:''}
        </div>`).join('');
    }catch(e){drop.innerHTML='<div style="padding:10px 14px;color:#ef4444;font-size:19px">조회 오류</div>';}
  },280);
};

window.specPickSuggest=function(partNo){
  const input=document.getElementById('spec-reverse-search');
  if(input) input.value=partNo;
  specHideSuggest();
  specReverseSearch();
};

window.specHideSuggest=function(){
  const drop=document.getElementById('spec-reverse-suggest');
  if(drop) drop.style.display='none';
  _specSuggestIdx=-1;
};

window.specSuggestHover=function(idx){
  _specSuggestIdx=idx;
  document.querySelectorAll('#spec-reverse-suggest [data-idx]').forEach(el=>{
    el.style.background=Number(el.dataset.idx)===idx?'#eff6ff':'';
  });
};

window.specSuggestFocus=function(dir){
  const items=[...document.querySelectorAll('#spec-reverse-suggest [data-idx]')];
  if(!items.length) return;
  _specSuggestIdx=Math.max(0,Math.min(items.length-1,_specSuggestIdx+dir));
  items.forEach((el,i)=>el.style.background=i===_specSuggestIdx?'#eff6ff':'');
  const pno=items[_specSuggestIdx]?.dataset?.pno;
  if(pno){const inp=document.getElementById('spec-reverse-search');if(inp)inp.value=pno;}
};

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('#spec-reverse-search')&&!e.target.closest('#spec-reverse-suggest'))
    specHideSuggest();
});

/* ── 자재 역추적 ── */
window.specReverseSearch=async function(){
    const q=(document.getElementById('spec-reverse-search')?.value||'').trim();
    const wrap=document.getElementById('spec-reverse-wrap');
    const badge=document.getElementById('spec-reverse-badge');
    const pnEl=document.getElementById('spec-reverse-partname');
    if(!wrap) return;
    if(!q){
      wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">품번 또는 품명을 입력하세요</div>';
      if(badge) badge.textContent='';
      if(pnEl) pnEl.style.display='none';
      return;
    }
    wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">검색 중...</div>';
    if(pnEl) pnEl.style.display='none';
    try{
      const rows=await AIT_API.getSpecBomParents(q);
      const list=(Array.isArray(rows)?rows:[]).filter(r=>r&&r.part_no);
      if(badge) badge.textContent=`${list.length}건`;
      if(pnEl){
        const partName=list.length>0?(list[0].sub_part_name||''):'';
        if(partName){pnEl.textContent=`자재 품명: ${partName}`;pnEl.style.display='';}
        else pnEl.style.display='none';
      }
      if(!list.length){
        wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">검색 결과 없음</div>';
        return;
      }
      let html=`<table style="width:100%;border-collapse:collapse;font-size:20px">
        <thead><tr style="background:#1e3264;color:#fff;position:sticky;top:0;z-index:1">
          <th style="padding:8px;text-align:center;width:52px">부품도</th>
          <th style="padding:8px;text-align:left;min-width:120px">완제품 도번</th>
          <th style="padding:8px;text-align:center;width:70px">구분</th>
          <th style="padding:8px;text-align:left">옵션명</th>
          <th style="padding:8px;text-align:left;min-width:100px">자재 품번</th>
          <th style="padding:8px;text-align:left">자재 품명</th>
          <th style="padding:8px;text-align:center;width:40px">수량</th>
        </tr></thead><tbody>`;
      list.forEach(row=>{
        const cat=_specCatalog.find(c=>c.part_no===row.part_no)||{};
        const tu=cat.file_id?AIT_API.driveUrl(cat.file_id):'';
        const thumb=tu
          ?`<img src="${tu}" style="width:40px;height:40px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">`
          :`<div style="width:40px;height:40px;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px">▣</div>`;
        html+=`<tr onclick="specSelectRow('${row.part_no}')" style="background:#fff;border-bottom:1px solid #f0f0f0;cursor:pointer">
          <td style="padding:5px 8px;text-align:center">${thumb}</td>
          <td style="padding:5px 8px;font-weight:600;color:#1e3264;font-family:monospace;font-size:19px">${row.part_no||''}</td>
          <td style="padding:5px 8px;text-align:center">${_partTypeBadge(row.part_no)}</td>
          <td style="padding:5px 8px;font-size:19px;color:#374151">${row.option_name||cat.option_name||''}</td>
          <td style="padding:5px 8px;font-family:monospace;font-size:18px;color:#6b7280">${row.sub_part_no||q}</td>
          <td style="padding:5px 8px;font-size:19px;color:#374151">${row.sub_part_name||''}</td>
          <td style="padding:5px 8px;text-align:center;color:#374151;font-size:19px">${row.qty||''}</td>
        </tr>`;
      });
      wrap.innerHTML=html+'</tbody></table>';
    }catch(e){
      wrap.innerHTML=`<div style="padding:30px;text-align:center;color:#ef4444;font-size:21px">오류: ${e.message}</div>`;
    }
};

/* ── 테이블 렌더 (카탈로그 + MES 오버레이) ── */
function specRenderTable(){
  const wrap=document.getElementById('spec-table-wrap');
  if(!wrap) return;
  if(!_specCatalog.length){
    wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">카탈로그 로드 중...</div>';
    return;
  }

  const hasMes=Object.keys(_specMesMap).length>0;

  // 작업지시 탭: MES 데이터만 표시
  if(_specTab==='orders'){
    if(!_specMesLoaded){
      wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">작업지시 조회 중...</div>';
      return;
    }
    if(!hasMes){
      wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">해당 날짜에 작업지시가 없습니다<br><span style="font-size:19px">전체 리스트 탭에서 전체 품목을 볼 수 있습니다</span></div>';
      return;
    }
  }

  let rows;
  if(_specTab==='orders'){
    // MES 색상코드 포함 part_no 기반으로 rows 구성 (928A2-N1010NNB 등)
    const ln=_getCarLineName();
    rows=Object.keys(_specMesMap)
      .filter(k=>_specMesMap[k].part_no===k)
      .map(k=>{
        const base=k.replace(/[A-Z]{2}[A-Z0-9]$/,'');
        const cat=_specCatalog.find(c=>c.part_no===base)||_specCatalog.find(c=>c.part_no===k)||null;
        const mesData=_specMesMap[k]||{};
        return cat?{...cat,part_no:k,_base:base,bom_part_no:mesData.bom_part_no||k}:null;
      })
      .filter(r=>r&&(!ln||!r.line_name||r.line_name===ln))
      .sort((a,b)=>b.part_no.localeCompare(a.part_no));
  } else {
    rows=_specCatalog;
    if(_specTab==='catalog'){
      const ln=_getCarLineName();
      if(ln) rows=rows.filter(r=>!r.line_name||r.line_name===ln);
    }
  }
  if(_specSearchQ) rows=rows.filter(r=>(r.part_no||'').toLowerCase().includes(_specSearchQ)||(r.option_name||'').toLowerCase().includes(_specSearchQ));

  const badge=document.getElementById('spec-count-badge');
  if(badge){
    const mesCount=_specTab==='orders'?rows.length:rows.filter(r=>_specMesMap[r.part_no]).length;
    badge.textContent=hasMes?`${mesCount}건 작업지시 / 전체 ${rows.length}`:` 전체 ${rows.length}`;
  }

  if(!rows.length){
    if(_specTab==='orders' && hasMes){
      const mesCnt=Object.keys(_specMesMap).filter(k=>_specMesMap[k].part_no===k).length;
      const ln=_getCarLineName();
      wrap.innerHTML=`<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">
        표시할 항목이 없습니다<br>
        <span style="font-size:17px;color:#ef4444">MES ${mesCnt}건 조회됐으나 사양표 카탈로그에 없거나 라인 불일치</span><br>
        <span style="font-size:15px;margin-top:8px;display:block">현재 라인: <b>${ln||'(없음)'}</b> · 브라우저 콘솔(F12)에서 [specMES] 로그 확인</span>
      </div>`;
    } else {
      wrap.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af;font-size:21px">검색 결과 없음</div>';
    }
    return;
  }

  // ── 전체 리스트: 컬러별 그룹 렌더 ──────────────────
  if(_specTab==='catalog'){
    // color_code가 콤마로 여러 개인 경우 각 컬러별로 확장
    const expanded=[];
    rows.forEach(row=>{
      const colors=(row.color_code||'').split(',').map(c=>c.trim()).filter(Boolean);
      if(!colors.length) expanded.push({...row,_color:'미분류'});
      else colors.forEach(c=>expanded.push({...row,_color:c}));
    });
    // 컬러 순서 유지하며 그룹화
    const colorGroups={}, colorOrder=[];
    expanded.forEach(row=>{
      if(!colorGroups[row._color]){colorGroups[row._color]=[];colorOrder.push(row._color);}
      colorGroups[row._color].push(row);
    });
    const COLOR_BG={'YGU':'#FEF9C3','NNB':'#E0F2FE','YUB':'#FCE7F3','MDE':'#DCFCE7','VKN':'#FEE2E2','SOS':'#EDE9FE','RZP':'#FFF7ED','NM5':'#F0FDF4','TS5':'#ECFDF5','NNB':'#E0F2FE'};
    let html=`<table style="width:100%;border-collapse:collapse;font-size:20px">
      <thead><tr style="background:#1e3264;color:#fff;position:sticky;top:0;z-index:1">
        <th style="padding:8px;text-align:center;width:52px">부품도</th>
        <th style="padding:8px;text-align:left;min-width:150px">도번</th>
        <th style="padding:8px;text-align:center;width:90px">구분</th>
        <th style="padding:8px;text-align:left">품명</th>
        <th style="padding:8px;text-align:center;width:40px">BOM</th>
        <th style="padding:8px;text-align:left;width:100px">작업지시번호</th>
        <th style="padding:8px;text-align:right;width:44px">수량</th>
      </tr></thead><tbody>`;
    colorOrder.forEach(color=>{
      const secBg=COLOR_BG[color]||'#F3F4F6';
      colorGroups[color].forEach((row,ri)=>{
        const mes=_specMesMap[row.part_no]||null;
        const isSel=row.part_no===_specSelectedPartNo;
        const hasMesRow=!!mes;
        const bg=isSel?'#eef2ff':(hasMesRow?'#f0fdf4':secBg);
        const tu=row.file_id?AIT_API.driveUrl(row.file_id):(_specDriveIndex[row._base||row.part_no]?AIT_API.driveUrl(_specDriveIndex[row._base||row.part_no]):(mes&&mes.file_id?AIT_API.driveUrl(mes.file_id):''));
        const thumb=tu
          ?`<img src="${tu}" style="width:40px;height:40px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">`
          :`<div style="width:40px;height:40px;background:#e5e7eb;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px">▣</div>`;
        const mesBadge=hasMesRow?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:4px;vertical-align:middle"></span>`:'';
        const nm=row.option_name||_specItemNames[row.part_no]||'';
        const bomKey=(row._color&&row._color!=='미분류'&&!row.part_no.endsWith(row._color))?(row.part_no+row._color):row.part_no;
        html+=`<tr data-pn="${row.part_no}" data-bg="${bg}" onclick="specSelectRow('${bomKey}','${row.part_no}')"
          style="background:${bg};border-bottom:1px solid #e5e7eb;cursor:pointer">
          <td style="padding:5px 8px;text-align:center">${thumb}</td>
          <td style="padding:5px 8px;font-weight:600;color:#1e3264;font-family:monospace;font-size:19px;white-space:nowrap">${mesBadge}${row.part_no||''}${_colorBadge(row._color)}</td>
          <td style="padding:5px 8px;text-align:center">${_partTypeBadge(row.part_no)}</td>
          <td style="padding:5px 8px;font-size:18px;color:#374151">${nm}</td>
          <td style="padding:5px 8px;text-align:center;color:#6b7280;font-size:19px">${row.bom_count||0}</td>
          <td style="padding:5px 8px;font-family:monospace;font-size:18px;color:#6b7280">${mes?mes.no_mmmo||'':''}</td>
          <td style="padding:5px 8px;text-align:right;font-weight:600;color:${hasMesRow?'#16a34a':'#9ca3af'}">${mes?mes.qt_order||'':''}</td>
        </tr>`;
      });
    });
    wrap.innerHTML=html+'</tbody></table>';
    return;
  }

  // ── 작업지시 탭 렌더 ─────────────────────────────
  let html=`<table style="width:100%;border-collapse:collapse;font-size:20px">
    <thead><tr style="background:#1e3264;color:#fff;position:sticky;top:0;z-index:1">
      <th style="padding:8px;text-align:center;width:52px">부품도</th>
      <th style="padding:8px;text-align:left;min-width:120px">도번</th>
      <th style="padding:8px;text-align:center;width:90px">구분</th>
      <th style="padding:8px;text-align:left;min-width:90px">품명</th>
      <th style="padding:8px;text-align:center;width:40px">BOM</th>
      <th style="padding:8px;text-align:left;width:100px">작업지시번호</th>
      <th style="padding:8px;text-align:right;width:44px">수량</th>
    </tr></thead><tbody>`;

  rows.forEach(row=>{
    const mes=_specMesMap[row.part_no]||null;
    const isSel=row.part_no===_specSelectedPartNo;
    const hasMesRow=!!mes;
    const bg=isSel?'#eef2ff':(hasMesRow?'#f0fdf4':'#fff');
    const tu=row.file_id?AIT_API.driveUrl(row.file_id):(_specDriveIndex[row._base||row.part_no]?AIT_API.driveUrl(_specDriveIndex[row._base||row.part_no]):(mes&&mes.file_id?AIT_API.driveUrl(mes.file_id):''));
    const thumb=tu
      ?`<img src="${tu}" style="width:40px;height:40px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">`
      :`<div style="width:40px;height:40px;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px">▣</div>`;
    const mesBadge=hasMesRow
      ?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:4px;vertical-align:middle"></span>`:'';
    const nm=row.option_name||_specItemNames[row._base||row.part_no]||(mes&&mes.nm_item)||'';
    const colorCode=row.bom_part_no?(row.bom_part_no.replace(row._base||row.part_no,'').substring(0,3)):'';
    html+=`<tr data-pn="${row.part_no}" onclick="specSelectRow('${row.part_no}','${row._base||row.part_no}')"
      style="background:${bg};border-bottom:1px solid #f0f0f0;cursor:pointer">
      <td style="padding:5px 8px;text-align:center">${thumb}</td>
      <td style="padding:5px 8px;font-weight:600;color:#1e3264;font-family:monospace;font-size:19px;white-space:nowrap">${mesBadge}${row._base||row.part_no||''}${_colorBadge(colorCode)}</td>
      <td style="padding:5px 8px;text-align:center">${_partTypeBadge(row._base||row.part_no)}</td>
      <td style="padding:5px 8px;font-size:19px;color:#374151">${nm}</td>
      <td style="padding:5px 8px;text-align:center;color:#6b7280;font-size:19px">${row.bom_count||0}</td>
      <td style="padding:5px 8px;font-family:monospace;font-size:18px;color:#6b7280">${mes?mes.no_mmmo||'':''}</td>
      <td style="padding:5px 8px;text-align:right;font-weight:600;color:${hasMesRow?'#16a34a':'#9ca3af'}">${mes?mes.qt_order||'':''}</td>
    </tr>`;
  });
  wrap.innerHTML=html+'</tbody></table>';
}

/* ── 행 선택 → 모달 오픈 ── */
// bomPartNo: BOM API 조회용 도번 (컬러 포함, 예: 928A2-N1000MDE)
// catalogPartNo: 카탈로그 표시용 원본 cd_item (컬러 없음, 예: 928A2-N1000)
window.specSelectRow = async function(bomPartNo, catalogPartNo){
  const displayPartNo = catalogPartNo || bomPartNo;
  _specSelectedPartNo=displayPartNo;
  _specSelectedCdItem=displayPartNo;
  document.querySelectorAll('#spec-table-wrap tr[data-pn]').forEach(tr=>{
    const mes=_specMesMap[tr.dataset.pn];
    const origBg=tr.dataset.bg||(mes?'#f0fdf4':'#fff');
    tr.style.background=tr.dataset.pn===displayPartNo?'#eef2ff':origBg;
  });

  const modal=document.getElementById('spec-bom-modal');
  const body=document.getElementById('spec-modal-body');
  const titleEl=document.getElementById('spec-modal-title');
  const subEl=document.getElementById('spec-modal-sub');
  const mesInfo=_specMesMap[displayPartNo]||{};
  const catalogItem=_specCatalog.find(c=>c.part_no===displayPartNo)||{};

  if(titleEl) titleEl.innerHTML=`${bomPartNo} ${_partTypeBadge(bomPartNo)}`;
  if(subEl){
    const parts=[];
    if(catalogItem.option_name) parts.push(catalogItem.option_name);
    if(mesInfo.nm_item) parts.push(mesInfo.nm_item);
    else if(mesInfo.qt_order) parts.push(`작업지시 수량: ${mesInfo.qt_order}`);
    subEl.textContent=parts.join(' | ');
  }
  if(body) body.innerHTML='<div style="text-align:center;color:#9ca3af;padding:40px">BOM 로드 중...</div>';
  if(modal) modal.style.display='flex';

  try{
    const bom=await AIT_API.getSpecBom(bomPartNo);
    _specBomData=Array.isArray(bom)?bom:[];
    specRenderModal(_specBomData);
  }catch(e){
    if(body) body.innerHTML=`<div style="text-align:center;color:#ef4444;padding:40px">로드 실패: ${e.message}</div>`;
  }
};

window.specCloseModal=function(){
  document.getElementById('spec-bom-modal').style.display='none';
  _specSelectedPartNo=null;
  _specSelectedCdItem=null;
  _specBomDeleted.clear();
  const saveBtn=document.getElementById('spec-modal-save-btn');
  if(saveBtn) saveBtn.style.display='none';
  document.querySelectorAll('#spec-table-wrap tr[data-pn]').forEach(tr=>{
    const mes=_specMesMap[tr.dataset.pn];
    tr.style.background=tr.dataset.bg||(mes?'#f0fdf4':'#fff');
  });
};

// ESC closes modal
document.addEventListener('keydown',e=>{ if(e.key==='Escape') specCloseModal(); });

/* ── 모달 렌더 ── */
function specRenderModal(bom){
  const body=document.getElementById('spec-modal-body');
  if(!body) return;
  const visibleBom=bom.filter(r=>!_specBomDeleted.has(String(r.sub_part_no)))
    .sort((a,b)=>String(b.sub_part_no||'').localeCompare(String(a.sub_part_no||''),undefined,{numeric:true,sensitivity:'base'}));
  if(!visibleBom.length){
    body.innerHTML='<div style="text-align:center;color:#9ca3af;padding:40px">BOM 정보 없음</div>';
    return;
  }
  const html=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
    ${visibleBom.map((row,idx)=>{
      const photo=row.photos&&row.photos[0]?row.photos[0]:null;
      const driveFileId=!photo&&row.sub_part_no?_specDriveIndex[String(row.sub_part_no)]:null;
      const imgUrl=photo
        ?(AIT_API.normalizePhotoUrl(photo.photo_url)||AIT_API.driveUrl(photo.file_id))
        :(driveFileId?AIT_API.driveUrl(driveFileId):'');
      const imgFallback=driveFileId?`https://drive.google.com/uc?export=view&id=${driveFileId}`:'';
      const photoCount=row.photos?row.photos.length:0;
      const uploadBtn=_specEditMode
        ?`<label style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;
            border-radius:4px;padding:2px 7px;font-size:18px;cursor:pointer;white-space:nowrap">
            + 사진<input type="file" accept="image/*" style="display:none"
              onchange="specUploadPartPhoto(event,'${row.sub_part_no}',${idx})"></label>`
        :'';
      const delBtn=(photo&&_specEditMode)
        ?`<button onclick="event.stopPropagation();specDeletePartPhoto('${photo.file_id}','${row.sub_part_no}',${photo.photo_order||0},${idx})"
            style="position:absolute;top:4px;right:4px;background:#ef4444;color:#fff;border:none;
            border-radius:50%;width:18px;height:18px;font-size:19px;cursor:pointer;line-height:18px;padding:0">✕</button>`
        :'';
      const countBadge=photoCount>1
        ?`<span style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.55);color:#fff;
            border-radius:4px;padding:1px 5px;font-size:18px">${photoCount}장</span>`
        :'';
      const bomDelBtn=_specEditMode
        ?`<button onclick="specDeleteBomRow('${row.sub_part_no}')"
            style="width:100%;margin-top:6px;padding:4px 0;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;
            border-radius:5px;font-size:17px;cursor:pointer;font-weight:600">🗑 부품 삭제</button>`
        :'';
      return `<div style="background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden">
        <div style="position:relative;height:160px;background:#f3f4f6;cursor:pointer"
          onclick="specViewPartPhotos(${idx})">
          ${imgUrl
            ?`<img src="${imgUrl}" data-fb="${imgFallback}" style="width:100%;height:100%;object-fit:contain;background:#f8fafc;padding:4px;cursor:zoom-in"
                onclick="event.stopPropagation();openPhoto(this)"
                onerror="if(this.dataset.fb&&!this.dataset.tried){this.dataset.tried='1';this.src=this.dataset.fb;}else{this.outerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:#d1d5db;font-size:36px\\'>▣</div>';}">`
            :`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#d1d5db;font-size:36px">▣</div>`}
          ${countBadge}${uploadBtn}${delBtn}
        </div>
        <div style="padding:8px 10px">
          <div style="font-family:monospace;font-size:19px;color:#1e3264;font-weight:600;margin-bottom:3px">${row.sub_part_no||''}</div>
          <div style="font-size:19px;color:#374151;line-height:1.35;margin-bottom:4px">${row.part_name||''}</div>
          <div style="font-size:18px;color:#6b7280">수량: <strong>${row.qty||1}</strong></div>
          ${bomDelBtn}
        </div>
      </div>`;
    }).join('')}
  </div>`;
  body.innerHTML=html;
}

/* ── 모달 편집 토글 ── */
window.specModalToggleEdit=function(btn){
  if(!_specEditMode){
    const pw=prompt('비밀번호를 입력하세요');
    if(pw!=='ait1234'){alert('비밀번호가 올바르지 않습니다.');return;}
  }
  _specEditMode=!_specEditMode;
  btn.textContent=_specEditMode?'✓ 완료':'✏ 편집';
  btn.style.background=_specEditMode?'rgba(255,255,255,.2)':'transparent';
  specRenderModal(_specBomData);
};

/* ── 부품별 사진 업로드 ── */
window.specUploadPartPhoto=async function(evt,subPartNo,rowIdx){
  const file=evt.target.files[0]; if(!file||_specUploading) return;
  _specUploading=true;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      showSaving();
      const row=_specBomData[rowIdx]||{};
      const order=(row.photos||[]).length;
      const res=await AIT_API.uploadSpecPhoto({cd_item:subPartNo,photo_order:order,filename:file.name,base64:e.target.result});
      if(!_specBomData[rowIdx].photos) _specBomData[rowIdx].photos=[];
      _specBomData[rowIdx].photos.push({file_id:res.fileId,photo_url:res.url,photo_order:order});
      specRenderModal(_specBomData);
      showToast('업로드 완료','success');
    }catch(err){ showToast('업로드 실패: '+err.message,'error'); }
    finally{ _specUploading=false; hideSaving(); }
  };
  reader.readAsDataURL(file);
};

/* ── 부품별 사진 삭제 ── */
window.specDeletePartPhoto=async function(fileId,subPartNo,photoOrder,rowIdx){
  if(!confirm('사진을 삭제하시겠습니까?')) return;
  try{
    await AIT_API.deleteSpecPhoto({fileId,cd_item:subPartNo,photo_order:photoOrder});
    if(_specBomData[rowIdx]?.photos)
      _specBomData[rowIdx].photos=_specBomData[rowIdx].photos.filter(p=>p.file_id!==fileId);
    specRenderModal(_specBomData);
    showToast('삭제 완료','success');
  }catch(e){ showToast('삭제 실패: '+e.message,'error'); }
};

/* ── BOM 부품 삭제 (staged) ── */
window.specDeleteBomRow=function(subPartNo){
  if(!confirm(`부품 ${subPartNo} 을(를) BOM에서 삭제하시겠습니까?\n저장 버튼을 눌러야 DB에 반영됩니다.`)) return;
  _specBomDeleted.add(String(subPartNo));
  document.getElementById('spec-modal-save-btn').style.display='';
  specRenderModal(_specBomData);
};

/* ── BOM 변경 저장 ── */
window.specSaveBomChanges=async function(){
  if(!_specBomDeleted.size) return;
  const partNo=_specSelectedPartNo;
  if(!partNo){ showToast('품번 정보가 없습니다.','error'); return; }
  showSaving();
  try{
    for(const subPartNo of _specBomDeleted){
      await AIT_API.deleteSpecBomRow(partNo, subPartNo);
    }
    _specBomData=_specBomData.filter(r=>!_specBomDeleted.has(String(r.sub_part_no)));
    _specBomDeleted.clear();
    document.getElementById('spec-modal-save-btn').style.display='none';
    specRenderModal(_specBomData);
    showToast('저장 완료','success');
  }catch(e){
    showToast('저장 실패: '+e.message,'error');
  }finally{ hideSaving(); }
};

/* ── 부품 사진 전체보기 (라이트박스) ── */
window.specViewPartPhotos=function(rowIdx){
  const row=_specBomData[rowIdx]; if(!row||!row.photos||!row.photos.length) return;
  const url=AIT_API.normalizePhotoUrl(row.photos[0].photo_url)||AIT_API.driveUrl(row.photos[0].file_id);
  if(typeof openLightbox==='function') openLightbox(url,row.part_name||row.sub_part_no||'');
};

/* ── 편집 모드 (툴바 버튼) ── */
window.specToggleEdit=function(btn){
  const paneEl=document.getElementById('pane-spec');
  if(_specEditMode){
    const save=confirm('데이터를 저장하겠습니까?\n\n[확인] 예 — 저장\n[취소] 아니오 — 저장하지 않고 나가기');
    if(save){
      if(typeof saveDocument==='function') saveDocument('spec');
    }else{
      _specEditMode=false;
      if(paneEl) paneEl.classList.remove('edit-mode');
      if(typeof _syncSidebarReset==='function') _syncSidebarReset();
      btn.textContent='✏ 편집 모드';
      btn.classList.remove('btn-primary');
      btn.classList.add('btn-ghost');
      btn.style.background='';
      btn.style.color='';
    }
  }else{
    const pw=prompt('비밀번호를 입력하세요');
    if(pw!=='ait1234'){alert('비밀번호가 올바르지 않습니다.');return;}
    _specEditMode=true;
    if(paneEl) paneEl.classList.add('edit-mode');
    if(typeof _syncSidebarReset==='function') _syncSidebarReset();
    btn.textContent='✓ 편집 완료';
    btn.classList.remove('btn-ghost');
    btn.classList.add('btn-primary');
    btn.style.background='';
    btn.style.color='';
  }
};

window.specSetEditable=function(on){
  _specEditMode=!!on;
};

/* ── 초기화 ── */
(function(){
  const today=new Date();
  _specDay=today.getDate();
  const sel=document.getElementById('spec-sel-date');
  if(sel) sel.textContent=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(_specDay).padStart(2,'0')}`;
  specSwitchTab('orders');
  specRenderDayPicker();
  // 카탈로그 로드 후 오늘 MES 오버레이
  specLoadCatalog().then(()=>specLoadMes(_fmtDate(today.getFullYear(),today.getMonth()+1,_specDay)));
})();

})();
</script>
