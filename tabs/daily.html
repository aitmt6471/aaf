<!-- 설비일상점검표 -->
<style>
@media print {
  #d-sel-date, #d-worker-bar, #d-verifier-bar { display: none !important; }
}
</style>
<div class="tab-toolbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:15px;font-weight:900;color:#1e3264;letter-spacing:2px">설비일상점검표</span>
    <div style="width:1px;height:16px;background:var(--border)"></div>
    <span id="daily-rev-badge" style="font-size:13px;font-weight:700;color:#111827">Rev. 0</span>
    <span id="daily-rev-date" style="font-size:13px;color:#374151">개정일: -</span>
    <button class="btn btn-ghost btn-sm" onclick="openRevModal('daily')">이력</button>
  </div>
  <div style="flex:1"></div>
  <button id="alarm-toggle-btn" class="btn btn-ghost btn-sm edit-only" onclick="window._aitOpenAlarmModal()"

    <span id="alarm-toggle-icon">🔔</span><span id="alarm-toggle-label">알람설정</span>
  </button>
  <button class="btn btn-ghost btn-sm edit-only" onclick="(function(){var pw=prompt('비밀번호를 입력하세요');if(pw!=='ait1234'){alert('비밀번호가 올바르지 않습니다.');return;}dailyResetToDefault();})()" style="color:#dc2626">기본값 복원</button>
  <button class="btn btn-ghost btn-sm edit-only" onclick="saveDocument('daily')">저장</button>
  <button class="btn btn-ghost btn-sm" onclick="window.print_daily && window.print_daily()">🖨 인쇄</button>
  <button class="btn btn-ghost btn-sm" id="daily-edit-btn" onclick="toggleTabEditMode('daily',this)">&#x270F; 편집 모드</button>
</div>

<!-- 전체 콘텐츠 래퍼 -->
<div style="display:flex;flex-direction:column;height:calc(100vh - 100px);overflow:hidden">

  <!-- 설비 탭 (좌우 스크롤) -->
  <div id="d-equip-tabs" class="process-nav" style="flex-shrink:0"></div>

<!-- 설비 정보 -->
<div style="padding:0;border-top:3px solid #fff;border-bottom:3px solid #fff;flex-shrink:0">
  <table style="border-collapse:collapse;font-size:12px;width:100%;table-layout:fixed">
    <colgroup>
      <col style="width:58px"><col style="width:160px">
      <col style="width:64px"><col style="width:50px">
      <col style="width:58px"><col style="width:130px">
      <col style="width:58px"><col style="width:80px">
      <col style="width:70px"><col style="width:100px">
    </colgroup>
    <tbody><tr>
      <th style="background:#1e3264;border:1px solid #1e3264;padding:7px 8px;font-weight:600;color:#fff;white-space:nowrap;text-align:center">설비명</th>
      <td id="d-equip-name" style="border:1px solid var(--border);padding:7px 8px;background:#fff;font-weight:600"></td>
      <th style="background:#1e3264;border:1px solid #1e3264;padding:7px 8px;font-weight:600;color:#fff;white-space:nowrap;text-align:center">공정번호</th>
      <td id="d-proc-no" style="border:1px solid var(--border);padding:7px 8px;background:#fff;text-align:center"></td>
      <th style="background:#1e3264;border:1px solid #1e3264;padding:7px 8px;font-weight:600;color:#fff;white-space:nowrap;text-align:center">공정명</th>
      <td id="d-proc-name" style="border:1px solid var(--border);padding:7px 8px;background:#fff"></td>
      <th style="background:#1e3264;border:1px solid #1e3264;padding:7px 8px;font-weight:600;color:#fff;white-space:nowrap;text-align:center">설치장소</th>
      <td id="d-location" style="border:1px solid var(--border);padding:7px 8px;background:#fff"></td>
      <th style="background:#1e3264;border:1px solid #1e3264;padding:7px 8px;font-weight:600;color:#fff;white-space:nowrap;text-align:center">관리책임자</th>
      <td id="d-manager" style="border:1px solid var(--border);padding:7px 8px;background:#fff"></td>
    </tr></tbody>
  </table>
</div>

<!-- 2열 메인 레이아웃 -->
<div style="display:flex;flex:1;min-height:0;border-bottom:2px solid #c9d4e8">

  <!-- 왼쪽 55%: 사진 패널 -->
  <div id="d-photo-panel" style="flex:0 0 50%;min-width:0;overflow:hidden;display:flex;flex-direction:column;border-right:2px solid #c9d4e8;background:#fff;min-height:0">
    <!-- 사진 패널 헤더 -->
    <div style="background:#1e3264;color:#fff;padding:9px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span style="font-size:12px;font-weight:700;letter-spacing:.6px">설비 사진</span>
      <span id="d-photo-status" style="font-size:11px;color:rgba(255,255,255,.6)"></span>
    </div>
    <!-- 메인 사진 표시 영역 -->
    <div id="d-photo-main" style="flex:1;background:#f3f4f6;position:relative;overflow:hidden;min-height:280px;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;color:#9ca3af">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <div style="font-size:11px;margin-top:6px">사진을 선택하세요</div>
      </div>
    </div>
    <!-- 하단 썸네일 스트립 -->
    <div style="background:#f8f9fa;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;overflow:hidden">
      <div id="d-photo-strip" style="display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding-bottom:4px;min-width:0"></div>
    </div>
  </div>

  <!-- 오른쪽 45%: 월선택 + 날짜선택 + 점검항목 -->
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#fff">
    <div style="flex:1;min-height:0;overflow-y:auto;overflow-x:hidden">

      <!-- 월 선택 -->
      <div style="padding:10px 16px;border-bottom:3px solid #fff;background:#1e3264;display:flex;align-items:center;gap:10px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick="prevMonth('daily');dailyRenderDayPicker()"
          style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x2039;</button>
        <span id="daily-month-label" style="font-weight:700;font-size:14px;min-width:90px;text-align:center;color:#fff">2026년 4월</span>
        <button class="btn btn-ghost btn-sm" onclick="nextMonth('daily');dailyRenderDayPicker()"
          style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)">&#x203A;</button>
        <span style="color:rgba(255,255,255,.35);margin:0 4px">|</span>
        <span id="d-sel-date" style="font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);padding:3px 12px;border-radius:6px;letter-spacing:.5px">날짜 선택</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <div id="d-worker-bar" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:4px 10px">
            <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">점검자</span>
            <input id="d-worker-input" type="text" placeholder="이름 입력"
              style="border:none;background:transparent;font-size:11px;font-family:inherit;width:70px;outline:none;color:#fff;caret-color:#fff"
              onchange="window._dSaveWorker(this.value)">
          </div>
          <div id="d-verifier-bar" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:4px 10px">
            <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">확인자</span>
            <input id="d-verifier-input" type="text" placeholder="이름 입력"
              style="border:none;background:transparent;font-size:11px;font-family:inherit;width:70px;outline:none;color:#fff;caret-color:#fff"
              onchange="window._dSaveVerifier(this.value)">
          </div>
          <button onclick="window._dSaveNow()" id="d-save-btn"
            style="font-size:11px;font-weight:700;padding:5px 14px;border-radius:8px;border:1px solid #fff;background:#fff;color:#1e3264;cursor:pointer;letter-spacing:.5px">
            저장
          </button>
          <button onclick="window._dEditMode()" id="d-edit-result-btn"
            style="display:none;font-size:11px;font-weight:700;padding:5px 14px;border-radius:8px;border:1px solid #d97706;background:#d97706;color:#fff;cursor:pointer;letter-spacing:.5px">
            수정
          </button>
        </div>
      </div>

      <!-- 날짜 선택 -->
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);background:#f4f7fc;flex-shrink:0">
        <div style="display:flex;flex-wrap:wrap;gap:4px" id="d-day-picker"></div>
      </div>

      <!-- 점검 항목 -->
      <div style="padding:14px 16px;overflow-x:auto;background:#fff">
        <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">점검 항목</div>
        <table id="d-check-table" style="border-collapse:collapse;font-size:12px;table-layout:fixed">
          <colgroup id="d-check-colgroup"></colgroup>
          <thead><tr id="d-check-thead-row" style="background:#1e3264"></tr></thead>
          <tbody id="d-check-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>

</div><!-- /2열 메인 레이아웃 -->
</div><!-- /전체 콘텐츠 래퍼 -->
<script>
(function(){
let DAILY_EQUIP = [];
let DAILY_ITEMS = {}; // { "equipId_itemNo": { id, equip_id, item_name, standard, method, cycle } }
let _dWorkerCache = {}; // { "year_month_day_equipIdx": workerName }
let _dVerifierCache = {}; // { "year_month_day_equipIdx": verifierName }
let _dReadOnly = false; // 현재 날짜/설비 읽기 모드 여부

async function _dLoadItems() {
  if (!window.currentCarId) return;
  try {
    const rows = await AIT_API.getDailyItems(window.currentCarId);
    DAILY_ITEMS = {};
    rows.forEach(r => { DAILY_ITEMS[`${r.equip_id}_${r.item_no}`] = r; });
    // equip_name 역매핑으로 DAILY_EQUIP.id 보완 (getDailyEquipments 매핑 실패 방어)
    const _nameToEquipId = {};
    rows.forEach(r => { if (r.equip_name && r.equip_id) _nameToEquipId[r.equip_name] = r.equip_id; });
    DAILY_EQUIP.forEach(e => { if (!e.id && _nameToEquipId[e.sheet]) e.id = _nameToEquipId[e.sheet]; });
    // daily_items가 없거나, DB에 없는 설비가 있으면 자동 동기화
    const _dbEquipIds = new Set(rows.map(r => String(r.equip_id)));
    const _hasNewEquip = DAILY_EQUIP.some(e => e.id && !_dbEquipIds.has(String(e.id)));
    if ((rows.length === 0 || _hasNewEquip) && DAILY_EQUIP.length > 0) {
      const allItems = [];
      DAILY_EQUIP.forEach(e => {
        if (!e.id || !e.items) return;
        e.items.forEach(item => allItems.push({
          equip_id: e.id, item_no: String(item.no),
          item_name: item.name||'', standard: item.std||'',
          method: item.method||'', cycle: item.cycle||''
        }));
      });
      const _allHasContent = allItems.some(it => it.item_name || it.standard || it.method || it.cycle);
      if (allItems.length && _allHasContent) {
        await AIT_API.syncDailyItems(window.currentCarId, allItems);
        const reloaded = await AIT_API.getDailyItems(window.currentCarId);
        DAILY_ITEMS = {};
        reloaded.forEach(r => { DAILY_ITEMS[`${r.equip_id}_${r.item_no}`] = r; });
      }
    }
  } catch(e) { console.warn('daily items 로드 실패', e); }
}

// 점검 결과 인메모리 캐시: { "year_month_day_equipIdx": { [itemNo]: { result, remark, savedAt, modifiedAt } } }
let _dResults = {};

let curEquip = 0, curDay = 1, dailyEditMode = false;

function getCar(){ return typeof getCurrentCar==='function' ? getCurrentCar() : 'GN7 OHCL'; }

/* ── Equipment tabs (수평) ── */
(function(){
  const c = document.getElementById('d-equip-tabs');
  c.innerHTML = DAILY_EQUIP.map((e,i)=>
    `<button data-deq="${i}" class="proc-btn${i===0?' active':''}" onclick="window._dSelEquip(${i},this)">${e.sheet}</button>`
  ).join('');
})();

window._dSelEquip = function(idx, btn){
  curEquip=idx;
  const _today=new Date(), _m=getTabMonth('daily');
  curDay=(_m.year===_today.getFullYear()&&_m.month===_today.getMonth()+1)?_today.getDate():1;
  document.querySelectorAll('[data-deq]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const _em=getTabMonth('daily');
  _dSetReadOnly(_dHasDBData.has(`${idx}_${curDay}_${_em.year}_${_em.month}`));
  renderEquipInfo(); dailyRenderDayPicker(); _dUpdateDateBadge(); renderCheckTable(); loadAndRenderPhotos();
  if (!_dHasLocalResults(idx, curDay)) _dLoadResultsFromDB(idx, curDay);
};

/* ── Equipment info ── */
function renderEquipInfo(){
  const e=DAILY_EQUIP[curEquip];
  const set=(id,v)=>{const el=document.getElementById(id); if(el){el.textContent=v; el.contentEditable=dailyEditMode?'true':'false';}};
  set('d-equip-name',e.sheet); set('d-proc-no',e.proc_no);
  const _dLinename = JSON.parse(localStorage.getItem(`ait_cp_meta_${getCar()}`) || '{}').linename || '';
  set('d-proc-name',e.proc_name); set('d-location',e.location || _dLinename || 'GN7 外');
  set('d-manager',e.manager||'이성호');
  const _eph=document.getElementById('d-equip-label-ph'); if(_eph) _eph.textContent=e.sheet;
}

window._dFlushInfo = function(){
  const e = DAILY_EQUIP[curEquip]; if(!e) return;
  const g = id => document.getElementById(id)?.textContent.trim() || '';
  e.sheet     = g('d-equip-name') || e.sheet;
  e.proc_no   = g('d-proc-no')    || e.proc_no;
  e.proc_name = g('d-proc-name')  || e.proc_name;
  e.location  = g('d-location')   || e.location;
  e.manager   = g('d-manager')    || e.manager;
};
window._dailyGetEquip = () => DAILY_EQUIP;

// DB에서 로드한 설비 목록으로 탭 재초기화
window._dInitEquip = async function(list) {
  // id 없는 CP 데이터 → DB 동기화 후 ID만 병합 (이름·항목은 CP 데이터 유지)
  if (list.length > 0 && list.some(e => !e.id) && window.currentCarId && !AIT_API.MOCK) {
    const noIdItems = list.filter(e => !e.id);
    try {
      await AIT_API.syncDailyEquip(window.currentCarId, noIdItems.map(e => ({
        sheet: e.sheet,
        proc_no: e.proc_no || '',
        proc_name: e.proc_name || '',
        location: e.location || '',
        manager: e.manager || '',
        sort_order: list.indexOf(e)
      })));
    } catch(err) { console.warn('설비 DB 등록 실패', err); }
    try {
      const dbRows = await AIT_API.getDailyEquipments(window.currentCarId);
      if (dbRows && dbRows.length) {
        const idMap = {};
        dbRows.forEach(r => { idMap[r.equip_name] = { id: r.id, photo_count: r.photo_count||0 }; });
        list = list.map(e => ({ ...e, ...(idMap[e.sheet] || {}) }));
      }
    } catch(e) { console.warn('설비 DB ID 조회 실패', e); }
  }
  // 동명 설비 중복 제거 (DB 중복 행 방어)
  const _seen = new Set();
  DAILY_EQUIP = list.filter(e => { if (_seen.has(e.sheet)) return false; _seen.add(e.sheet); return true; });
  curEquip = 0;
  // 현재 선택 월이 오늘 월이면 curDay를 오늘 날짜로 설정
  const today = new Date();
  const m = typeof getTabMonth === 'function' ? getTabMonth('daily') : { year: today.getFullYear(), month: today.getMonth()+1 };
  if (m.year === today.getFullYear() && m.month === today.getMonth()+1) {
    curDay = today.getDate();
  }
  // CP → DAILY_ITEMS 즉시 반영 (CP = 단일 진실 소스, 구 DB 캐시 덮어씀)
  DAILY_ITEMS = {};
  list.forEach(e => {
    if (!e.id || !e.items) return;
    e.items.forEach(item => {
      DAILY_ITEMS[`${e.id}_${item.no}`] = {
        equip_id: e.id, item_no: item.no,
        item_name: item.name || '', standard: item.std || '',
        method: item.method || '', cycle: item.cycle || ''
      };
    });
  });
  // ait_daily_items DB 백그라운드 동기화 (persistence, CP가 변경될 때 DB도 최신화)
  if (window.currentCarId && !AIT_API.MOCK) {
    const _syncItems = [];
    list.forEach(e => {
      if (!e.id || !e.items) return;
      e.items.forEach(item => _syncItems.push({
        equip_id: e.id, item_no: String(item.no),
        item_name: item.name||'', standard: item.std||'',
        method: item.method||'', cycle: item.cycle||''
      }));
    });
    const _hasContent = _syncItems.some(it => it.item_name || it.standard || it.method || it.cycle);
    if (_syncItems.length && _hasContent) {
      try { await AIT_API.syncDailyItems(window.currentCarId, _syncItems); }
      catch(e) { console.warn('daily items 동기화 실패', e); }
    }
    await _dLoadItems(); // DB id 필드 반드시 로드 (저장 시 item_id FK에 필요)
    // CP standard → DAILY_ITEMS 강제 반영 (DB standard가 오래됐어도 CP 기준 항상 우선)
    DAILY_EQUIP.forEach(e => {
      if (!e.id || !e.items) return;
      e.items.forEach(item => {
        const key = `${e.id}_${item.no}`;
        if (DAILY_ITEMS[key]) DAILY_ITEMS[key].standard = item.std || '';
      });
    });
  }
  const c = document.getElementById('d-equip-tabs');
  if (!c) return;
  c.innerHTML = DAILY_EQUIP.map((e,i)=>
    `<button data-deq="${i}" class="proc-btn${i===0?' active':''}" onclick="window._dSelEquip(${i},this)">${e.sheet}</button>`
  ).join('');
  if (DAILY_EQUIP.length > 0) {
    renderEquipInfo();
    if (typeof dailyRenderDayPicker === 'function') dailyRenderDayPicker();
    if (typeof renderCheckTable === 'function') renderCheckTable();
    loadAndRenderPhotos();
    _dLoadResultsFromDB(0, curDay); // 초기 로드 시 DB에서 결과 자동 조회
  }
};

/* ── Photo strip (Drive + DB 연동) ── */
const _dailyPhotos = {};
// equipId 없는 설비는 설비명을 캐시 키로 사용해 사진 공유 방지
function _photoKey(e) { return e?.id ? `id_${e.id}` : `sheet_${e?.sheet || curEquip}`; }

async function loadEquipPhotos(e) {
  const key = _photoKey(e);
  const equipId = e?.id;
  _dailyPhotos[key] = [];
  if (!equipId || !window.currentCarId || AIT_API.MOCK) return;
  try {
    const rows = await AIT_API.getDailyEquipPhotos(window.currentCarId, equipId);
    _dailyPhotos[key] = rows || [];
  } catch(err) { console.warn('사진 로드 실패', err); }
}

async function loadAndRenderPhotos() {
  const e = DAILY_EQUIP[curEquip]; if (!e) return;
  const st = document.getElementById('d-photo-status');
  if (st) st.textContent = '로딩 중…';
  await loadEquipPhotos(e);
  if (st) st.textContent = '';
  renderPhotoStrip();
}

function _dShowMainPhoto(url) {
  const main = document.getElementById('d-photo-main'); if (!main) return;
  if (url) {
    const safeUrl = url.replace(/'/g,'%27');
    main.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:contain;cursor:zoom-in;display:block;max-height:100%" onclick="window._dOpenPhoto('${safeUrl}')">`;
  } else {
    main.innerHTML = `<div style="text-align:center;color:#9ca3af"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><div style="font-size:11px;margin-top:6px">사진 없음</div></div>`;
  }
}

function renderPhotoStrip() {
  const e = DAILY_EQUIP[curEquip]; if (!e) return;
  const strip = document.getElementById('d-photo-strip'); if (!strip) return;
  const photoKey = _photoKey(e), photoCount = e.photo_count || e.items.length || 0;
  const photos = _dailyPhotos[photoKey] || [];
  const getP = o => photos.find(p => parseInt(p.photo_order) === o);
  const totalSlots = 1 + photoCount;
  let html = '';
  let firstUrl = '';
  for (let i = 0; i < totalSlots; i++) {
    const p = getP(i);
    const _itemName = (i > 0 && e.items && e.items[i-1]) ? (e.items[i-1].name || '') : '';
    const _baseLabel = i === 0 ? '전체사진' : (_itemName || `상세사진 ${i}`);
    const label = i === 0 ? _baseLabel : `${i}.${_baseLabel}`;
    const hasPhoto = p && p.photo_url;

window._dUploadEquipPhoto = async function(order, input) {
  const file = input.files[0]; input.value = ''; if (!file) return;
  if (file.size > 10*1024*1024) { alert('10MB 이하 이미지만 가능합니다.'); return; }
  const car = getCar();
  let e = DAILY_EQUIP[curEquip], equipId = e?.id;
  if (!equipId && window.currentCarId && !AIT_API.MOCK) {
    try {
      await AIT_API.syncDailyEquip(window.currentCarId, [{
        sheet: e.sheet, proc_no: e.proc_no||'', proc_name: e.proc_name||'',
        location: e.location||'', manager: e.manager||'', sort_order: DAILY_EQUIP.indexOf(e)
      }]);
      const dbRows = await AIT_API.getDailyEquipments(window.currentCarId);
      const found = dbRows && dbRows.find(r => r.equip_name === e.sheet);
      if (found) { e.id = found.id; equipId = found.id; }
    } catch(err) { console.warn('설비 등록 재시도 실패', err); }
  }
  const photoKey = _photoKey(e);
  if (!equipId) { alert('설비 DB 동기화가 완료되지 않았습니다. 잠시 후 다시 시도해주세요.'); return; }
  const st = document.getElementById('d-photo-status'); if (st) st.textContent = '업로드 중…';
  const r = new FileReader();
  r.onload = async ev => {
    try {
      // 기존 슬롯 사진이 있으면 Drive에서 먼저 삭제
      const existing = (_dailyPhotos[photoKey]||[]).find(p => parseInt(p.photo_order) === order);
      if (existing) {
        const oldFileId = existing.media_file_id || existing.file_id;
        if (oldFileId) { try { await AIT_API.deleteDailyPhoto(oldFileId); } catch(_) {} }
      }
      const base64 = ev.target.result.split(',')[1];
      const ext = (file.name.split('.').pop()||'jpg');
      const res = await AIT_API.uploadDailyPhoto({ car, proc: e.proc_no, filename: `daily_${car}_equip${equipId}_slot${order}_${Date.now()}.${ext}`, base64 });
      const entry = { photo_order: order, photo_url: AIT_API.driveUrl(res.fileId), media_file_id: res.fileId, file_id: res.fileId };
      if (!_dailyPhotos[photoKey]) _dailyPhotos[photoKey] = [];
      const idx = _dailyPhotos[photoKey].findIndex(p => parseInt(p.photo_order) === order);
      if (idx >= 0) _dailyPhotos[photoKey][idx] = entry; else _dailyPhotos[photoKey].push(entry);
      await AIT_API.syncDailyEquipPhotos(window.currentCarId, equipId, _dailyPhotos[photoKey]);
      if (st) st.textContent = ''; renderPhotoStrip();
    } catch(err) { if (st) st.textContent = ''; alert('업로드 실패: ' + (err.message||err)); }
  };
  r.readAsDataURL(file);
};

/* ── 한국 공휴일 + 대체공휴일 ── */
const KR_FIXED = ['1-1','3-1','5-5','6-6','8-15','10-3','10-9','12-25'];
// 음력 공휴일(설날·추석 연휴) + 대체공휴일 — 연도별 하드코딩
const KR_EXTRA = {
  2025:['1-27','1-28','1-29',  // 설날 연휴
        '3-3',                  // 삼일절 대체 (3/1 토)
        '10-5','10-6','10-7',  // 추석 연휴
        '10-8'],                // 추석 대체 (10/5 일)
  2026:['2-16','2-17','2-18',  // 설날 연휴
        '3-2',                  // 삼일절 대체 (3/1 일)
        '6-3',                  // 지방선거 (2026)
        '8-17',                 // 광복절 대체 (8/15 토)
        '9-25','9-26','9-27',  // 추석 연휴
        '9-28','9-29',          // 추석 대체 (9/26 토, 9/27 일)
        '10-5']                 // 개천절 대체 (10/3 토)
};
// 자동계산 대체공휴일에서 제외 (선거일 등 특수 사유로 정부가 미지정한 경우)
const KR_NO_SUB = {
  2026: ['6-8']  // 현충일(6/6 토) 대체 — 지방선거(6/3)로 인해 미지정
};
// 고정 공휴일 토·일 → 대체 자동 계산 (설날·추석 제외)
function _calcSubs(year){
  const subs=new Set();
  [[1,1],[3,1],[5,5],[6,6],[8,15],[10,3],[10,9],[12,25]].forEach(([mo,da])=>{
    const dow=new Date(year,mo-1,da).getDay();
    let offset=0;
    if(dow===0) offset=1;       // 일요일 → 다음 월요일
    else if(dow===6) offset=2;  // 토요일 → 다음 월요일
    if(offset){const s=new Date(year,mo-1,da+offset);subs.add(`${s.getMonth()+1}-${s.getDate()}`);}
  });
  return subs;
}
const _subCache={};
function isHoliday(m,d){
  const dow=new Date(m.year,m.month-1,d).getDay();
  if(dow===0) return true;
  const md=`${m.month}-${d}`;
  if(KR_FIXED.includes(md)) return true;
  const extra=KR_EXTRA[m.year];
  if(extra && extra.includes(md)) return true;
  if(!_subCache[m.year]) _subCache[m.year]=_calcSubs(m.year);
  const noSub = KR_NO_SUB[m.year] || [];
  return _subCache[m.year].has(md) && !noSub.includes(md);
}

/* ── DB 결과 로드 (localStorage 미스 시 폴백) ── */
const _dDBLoadedDays = new Set();
const _dHasDBData = new Set();
const _dMonthStatusLoaded = new Set(); // "equipIdx_year_month"
const _dMonthStatusData = {};          // { "year_month_day_equipIdx": 'ok'|'ng'|'partial' }
async function _dLoadResultsFromDB(equipIdx, day) {
  const equip = DAILY_EQUIP[equipIdx] || {};
  const equip_id = equip.id || equipIdx;
  if (!equip_id || !window.currentCarId || AIT_API.MOCK) return;
  const m = getTabMonth('daily'), car = getCar();
  const cacheKey = `${equipIdx}_${day}_${m.year}_${m.month}`;
  if (_dDBLoadedDays.has(cacheKey)) return;
  _dDBLoadedDays.add(cacheKey);
  const dateStr = `${m.year}-${String(m.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  try {
    const rows = await AIT_API.getDailyResults(equip_id, dateStr);
    console.log('[daily] rows[0]:', JSON.stringify(rows[0]));
    if (!rows || !rows.length) {
      if (equipIdx === curEquip && day === curDay) _dSetReadOnly(false);
      return;
    }
    _dHasDBData.add(cacheKey);
    const rKey=`${m.year}_${m.month}_${day}_${equipIdx}`;
    if(!_dResults[rKey]) _dResults[rKey]={};
    rows.forEach(r => {
      let itemNo = r.item_no;
      // n8n이 item_no 없이 item_id만 반환하는 경우 DAILY_ITEMS에서 역조회
      if (itemNo === undefined || itemNo === null) {
        const found = Object.values(DAILY_ITEMS).find(it => it.id == r.item_id);
        if (found) itemNo = found.item_no;
      }
      if (itemNo === undefined || itemNo === null) return;
      const _toIso = s => s ? String(s).replace(' ','T') : null;
      const _savedAt = _toIso(r.created_at||r.saved_at);
      const _modAt = _toIso(r.updated_at||r.modified_at);
      console.log('[daily] itemNo:', itemNo, 'savedAt:', _savedAt, 'created_at raw:', r.created_at);
      _dResults[rKey][itemNo]={result:r.result||'',remark:r.remark||'',savedAt:_savedAt,modifiedAt:_modAt};
    });
    // 점검자/확인자 복원
    const workerFromDb = rows[0]?.worker || '';
    if (workerFromDb) _dWorkerCache[`${m.year}_${m.month}_${day}_${equipIdx}`] = workerFromDb;
    const verifierFromDb = rows[0]?.verifier || '';
    if (verifierFromDb) _dVerifierCache[`${m.year}_${m.month}_${day}_${equipIdx}`] = verifierFromDb;
    if (equipIdx === curEquip && day === curDay) { _dSetReadOnly(true); renderCheckTable(); dailyRenderDayPicker(); }
  } catch(e) { console.warn('결과 DB 로드 실패', e); }
}
// 인쇄용: 한 달 전체 결과를 설비당 1회 요청으로 일괄 로드 (날짜별 개별 요청 폭주 방지)
async function _dLoadMonthResultsFromDB(equipIdx) {
  if (AIT_API.MOCK || !window.currentCarId) return true;
  if (!AIT_API.getDailyMonthResults) return false; // 구버전 api.js → 폴백 유도
  const equip = DAILY_EQUIP[equipIdx] || {};
  const equip_id = equip.id || equipIdx;
  if (!equip_id) return true;
  const m = getTabMonth('daily');
  const yearMonth = `${m.year}-${String(m.month).padStart(2,'0')}`;
  try {
    const rows = await AIT_API.getDailyMonthResults(equip_id, yearMonth);
    if (!rows || !rows.length) return true;
    const mNow = getTabMonth('daily');
    if (mNow.year !== m.year || mNow.month !== m.month) return true;
    const byDay = {};
    rows.forEach(r => {
      const day = new Date(String(r.check_date).slice(0,10) + 'T00:00:00').getDate();
      if (!day || isNaN(day)) return;
      (byDay[day] = byDay[day] || []).push(r);
    });
    Object.keys(byDay).forEach(dayStr => {
      const day = parseInt(dayStr, 10);
      const cacheKey = `${equipIdx}_${day}_${m.year}_${m.month}`;
      _dDBLoadedDays.add(cacheKey);
      _dHasDBData.add(cacheKey);
      const rKey = `${m.year}_${m.month}_${day}_${equipIdx}`;
      if (!_dResults[rKey]) _dResults[rKey] = {};
      byDay[day].forEach(r => {
        let itemNo = r.item_no;
        if (itemNo === undefined || itemNo === null) {
          const found = Object.values(DAILY_ITEMS).find(it => it.id == r.item_id);
          if (found) itemNo = found.item_no;
        }
        if (itemNo === undefined || itemNo === null) return;
        const _toIso = s => s ? String(s).replace(' ','T') : null;
        _dResults[rKey][itemNo] = {
          result: r.result || '', remark: r.remark || '',
          savedAt: _toIso(r.created_at||r.saved_at), modifiedAt: _toIso(r.updated_at||r.modified_at)
        };
      });
      const w = byDay[day][0]?.worker || '';
      if (w) _dWorkerCache[`${m.year}_${m.month}_${day}_${equipIdx}`] = w;
      const v = byDay[day][0]?.verifier || '';
      if (v) _dVerifierCache[`${m.year}_${m.month}_${day}_${equipIdx}`] = v;
    });
    return true;
  } catch(e) { console.warn('월 결과 일괄 로드 실패', e); return false; }
}
function _dHasLocalResults(equipIdx, day) {
  const m = getTabMonth('daily');
  return _dDBLoadedDays.has(`${equipIdx}_${day}_${m.year}_${m.month}`);
}

async function _dLoadMonthStatus(equipIdx) {
  const equip = DAILY_EQUIP[equipIdx] || {};
  const equipId = equip.id;
  if (!equipId || !window.currentCarId || AIT_API.MOCK) return;
  const m = getTabMonth('daily');
  const statusKey = `${equipIdx}_${m.year}_${m.month}`;
  if (_dMonthStatusLoaded.has(statusKey)) return;
  _dMonthStatusLoaded.add(statusKey);
  const yearMonth = `${m.year}-${String(m.month).padStart(2,'0')}`;
  try {
    const rows = await AIT_API.getDailyMonthStatus(equipId, yearMonth);
    if (!rows || !rows.length) return;
    // 로드 완료 후 월/설비가 바뀌었으면 무시
    const mNow = getTabMonth('daily');
    if (mNow.year !== m.year || mNow.month !== m.month) return;
    rows.forEach(r => {
      const day = new Date(r.check_date + 'T00:00:00').getDate();
      const rKey = `${m.year}_${m.month}_${day}_${equipIdx}`;
      _dHasDBData.add(`${equipIdx}_${day}_${m.year}_${m.month}`);
      const ng = parseInt(r.ng_count) > 0;
      const filled = parseInt(r.filled_count);
      const total = parseInt(r.total_items);
      let st = filled > 0 ? 'partial' : '';
      if (ng) st = 'ng';
      else if (total > 0 && filled >= total) st = 'ok';
      _dMonthStatusData[rKey] = st;
      // 전체 데이터가 아직 로드되지 않은 날만 버튼 업데이트
      if (equipIdx === curEquip && !_dDBLoadedDays.has(`${equipIdx}_${day}_${m.year}_${m.month}`)) {
        updateDayBtn(day);
      }
    });
  } catch(e) { console.warn('월 상태 로드 실패', e); }
}

/* ── Inspection table (single-day view) ── */
function renderCheckTable(){

/* ── 관리기준이 숫자 형식인지 판정 → 숫자가 하나라도 있으면 true ── */
function _dIsNumericStd(std) {
  return !!std && /[0-9]/.test(std);
}

/* ── 지시값 범위 판정 (null=판정불가, true=정상, false=이상) ── */
function _dCheckInRange(num, std) {
  if (isNaN(num) || !std) return null;
  const s = std.trim();
  let m;
  // 범위: 0.4~0.6
  m = s.match(/(-?[0-9.]+)\s*~\s*(-?[0-9.]+)/);
  if (m) return num >= parseFloat(m[1]) && num <= parseFloat(m[2]);
  // 중심±허용: 4KGF.CM ±0.5, 0 ± 0.15mm
  m = s.match(/(-?[0-9.]+)[^0-9~]*?±\s*([0-9.]+)/);
  if (m) { const c=parseFloat(m[1]),t=parseFloat(m[2]); return num>=c-t && num<=c+t; }
  // ≥ 또는 이상
  m = s.match(/[≥>]=?\s*(-?[0-9.]+)/);
  if (m) return num >= parseFloat(m[1]);
  m = s.match(/([0-9.]+)[^0-9]*이상/) || s.match(/이상[^0-9]*([0-9.]+)/);
  if (m) return num >= parseFloat(m[1]);
  // ≤ 또는 이하
  m = s.match(/[≤<]=?\s*(-?[0-9.]+)/);
  if (m) return num <= parseFloat(m[1]);
  m = s.match(/([0-9.]+)[^0-9]*이하/) || s.match(/이하[^0-9]*([0-9.]+)/);
  if (m) return num <= parseFloat(m[1]);
  return null;
}

/* ── 타임스탬프 헬퍼 ── */
function _dFmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function _dTsBadgeHtml(savedAt, modifiedAt) {
  if (!savedAt && !modifiedAt) return '';
  const parts = [];
  if (savedAt) parts.push(`<span style="color:#9ca3af" title="최초 저장">저장&nbsp;${_dFmtTs(savedAt)}</span>`);
  if (modifiedAt) parts.push(`<span style="color:#f59e0b" title="수정 저장">수정&nbsp;${_dFmtTs(modifiedAt)}</span>`);
  return parts.join('<br>');
}
function _dUpdateRowTs(itemNo, savedAt, modifiedAt) {
  const tr = document.querySelector(`#d-check-tbody tr[data-itemno="${itemNo}"]`);
  if (!tr) return;
  const badge = tr.querySelector('.d-ts-badge');
  if (badge) badge.innerHTML = _dTsBadgeHtml(savedAt, modifiedAt);
}

/* ── Pending results (debounce batch POST) ── */
let _dPendingResults = new Map(); // key → {equipIdx, itemNo, date, result, remark}
let _dSaveTimer = null;

function _dStageResult(equipIdx, itemNo, date, result, remark) {
  const key = `${equipIdx}_${itemNo}_${date}`;
  const prev = _dPendingResults.get(key) || { equipIdx, itemNo, date, result: '', remark: '' };
  _dPendingResults.set(key, {
    equipIdx, itemNo, date,
    result:  result  !== undefined ? result  : prev.result,
    remark:  remark  !== undefined ? remark  : prev.remark
  });
}

async function _dFlushResults(userConfirmed) {
  if (!_dPendingResults.size || !window.currentCarId) return;
  const now = new Date().toISOString();

  // dItem.id가 없는 항목이 있으면 DB에서 다시 로드 후 재시도
  let _hasNoId = false;
  _dPendingResults.forEach(v => {
    const equipDbId = (DAILY_EQUIP[v.equipIdx] || {}).id || v.equipIdx;
    if (!(DAILY_ITEMS[`${equipDbId}_${v.itemNo}`] || {}).id) _hasNoId = true;
  });
  if (_hasNoId) await _dLoadItems();

  const grouped = new Map();
  const _skippedNames = [];
  _dPendingResults.forEach((v) => {
    const gKey = `${v.equipIdx}_${v.date}`;
    if (!grouped.has(gKey)) grouped.set(gKey, { equipIdx: v.equipIdx, date: v.date, results: [], meta: [] });
    const [yr, mo, dy] = v.date.split('-');
    const rKey = `${yr}_${parseInt(mo)}_${parseInt(dy)}_${v.equipIdx}`;
    const existing = (_dResults[rKey] || {})[v.itemNo] || {};
    const equipDbId = (DAILY_EQUIP[v.equipIdx] || {}).id || v.equipIdx;
    const dItem = DAILY_ITEMS[`${equipDbId}_${v.itemNo}`] || {};
    if (!dItem.id) {
      const _nm = ((DAILY_EQUIP[v.equipIdx]||{}).items||[]).find(it=>String(it.no)===String(v.itemNo))?.name || `항목 ${v.itemNo}`;
      _skippedNames.push(_nm);
      console.warn('[daily] dItem.id 없음 — DAILY_ITEMS 동기화 필요:', {equipDbId, itemNo: v.itemNo});
      return;
    }
    grouped.get(gKey).results.push({ item_id: dItem.id, result: v.result || '', remark: v.remark || '', saved_at: now });
    grouped.get(gKey).meta.push({ itemNo: v.itemNo, rKey, isFirst: !existing.savedAt });
  });
  if (_skippedNames.length) {
    if (typeof showToast === 'function') showToast(`저장 실패 (DB 동기화 누락): ${_skippedNames.join(', ')} — 새로고침 후 재시도`, 'error');
  }

  // ── 저장 전 기준값 검증 (DAILY_ITEMS.standard 기준, 클라이언트 사이드) ──────────────────────────────
  {
    const allViolations = [];
    for (const [, g] of grouped) {
      const equip = DAILY_EQUIP[g.equipIdx] || {};
      g.results.forEach(r => {
        const dItem = Object.values(DAILY_ITEMS).find(it => it.id === r.item_id) || {};
        const std = dItem.standard || '';
        const result = (r.result || '').trim();
        if (!result || !_dIsNumericStd(std)) return;
        if (_dCheckInRange(parseFloat(result), std) === false) {
          allViolations.push({
            equip_name: equip.sheet || '',
            item_name: dItem.item_name || '',
            result,
            standard: std,
            issue: `범위초과 (기준:${std}, 입력:${result})`
          });
        }
      });
    }
    if (!userConfirmed && allViolations.length) {
      _dShowAlarmBlockModal(allViolations);
      return false;
    }
  }
  // ─────────────────────────────────────────────────────────

  _dPendingResults.clear();
  for (const [, g] of grouped) {
    if (!g.results.length) continue;
    const equip = DAILY_EQUIP[g.equipIdx] || {};
    const equip_id = equip.id || g.equipIdx;
    const worker = document.getElementById('d-worker-input')?.value || '';
    const verifier = document.getElementById('d-verifier-input')?.value || '';
    const payload = { equip_id, check_date: g.date, worker, verifier, results: g.results };
    try {
      await AIT_API.saveDailyResults(payload);
      g.meta.forEach(({ itemNo, rKey, isFirst }) => {
        if (!_dResults[rKey]) _dResults[rKey] = {};
        if (!_dResults[rKey][itemNo]) _dResults[rKey][itemNo] = { result: '', remark: '', savedAt: null, modifiedAt: null };
        if (isFirst) _dResults[rKey][itemNo].savedAt = now;
        else _dResults[rKey][itemNo].modifiedAt = now;
        if (g.equipIdx === curEquip) _dUpdateRowTs(itemNo, _dResults[rKey][itemNo].savedAt, _dResults[rKey][itemNo].modifiedAt);
      });
    } catch(e) {
      console.warn('결과 저장 실패', e);
      if (typeof showToast === 'function') showToast('저장 실패: 서버 연결을 확인하세요', 'error');
    }
  }
}

/* ── Save handlers — NO full re-render, targeted DOM update only ── */
window._dSaveRes=function(k,v,rowIdx){
  const km=k.match(/daily_[^_]+(?:_[^_]+){2}_(\d+)_(\d+)_(\d+)$/);
  if(km){
    const m=getTabMonth('daily');
    const rKey=`${m.year}_${m.month}_${km[1]}_${km[2]}`;
    if(!_dResults[rKey]) _dResults[rKey]={};
    if(!_dResults[rKey][km[3]]) _dResults[rKey][km[3]]={result:'',remark:'',savedAt:null,modifiedAt:null};
    _dResults[rKey][km[3]].result=v||'';
    const date=`${m.year}-${String(m.month).padStart(2,'0')}-${String(km[1]).padStart(2,'0')}`;
    _dStageResult(parseInt(km[2]), parseInt(km[3]), date, v, undefined);
  }
  const tr=document.querySelector(`#d-check-tbody tr[data-row="${rowIdx}"]`);
  if(tr){
    const isNg=v==='✕';
    tr.style.background=isNg?'#fff5f5':v==='○'?'#f7fef9':'#fff';
    const std=tr.cells[2]?.textContent?.trim()||'';
    if(_dIsNumericStd(std)){
      const numInput=tr.querySelector('input[type="text"]');
      const inR=v===''?null:_dCheckInRange(parseFloat(v),std);
      if(numInput){
        numInput.style.borderColor=inR===null?'var(--border)':(inR?'#86efac':'#fca5a5');
        numInput.style.background=inR===null?'#fff':(inR?'#dcfce7':'#fee2e2');
      }
      tr.style.background=inR===null?'#fff':(inR?'#f7fef9':'#fff5f5');
    } else {
      const sel=tr.querySelector('select');
      if(sel){
        sel.style.background=isNg?'#fee2e2':v==='○'?'#dcfce7':'#fff';
        sel.style.borderColor=isNg?'#fca5a5':v==='○'?'#86efac':'var(--border)';
      }
      const rmkInput=tr.querySelector('td:last-child input');
      if(rmkInput){
        rmkInput.placeholder=isNg?'이상조치 입력':'비고';
        rmkInput.style.borderColor=isNg?'#fca5a5':'var(--border)';
        rmkInput.style.background=isNg?'#fff0f0':'#fff';
      }
    }
  }
  updateDayBtn(parseInt(km?km[1]:curDay));
};
window._dSaveRmk=function(k,v){
  // DB에 debounce 저장 (k: daily_rmk_${car}_${year}_${month}_${day}_${equipIdx}_${itemNo})
  const km=k.match(/daily_rmk_[^_]+(?:_[^_]+){2}_(\d+)_(\d+)_(\d+)$/);
  if(km){
    const m=getTabMonth('daily');
    const rKey=`${m.year}_${m.month}_${km[1]}_${km[2]}`;
    if(!_dResults[rKey]) _dResults[rKey]={};
    if(!_dResults[rKey][km[3]]) _dResults[rKey][km[3]]={result:'',remark:'',savedAt:null,modifiedAt:null};
    _dResults[rKey][km[3]].remark=v||'';
    const date=`${m.year}-${String(m.month).padStart(2,'0')}-${String(km[1]).padStart(2,'0')}`;
    _dStageResult(parseInt(km[2]), parseInt(km[3]), date, undefined, v);
  }
};
window._dSaveNow=async function(){
  const _w=document.getElementById('d-worker-input')?.value.trim()||'';
  const _v=document.getElementById('d-verifier-input')?.value.trim()||'';
  if(!_w||!_v){alert('점검자와 확인자를 모두 입력해주세요.');return;}
  // ── 미입력/스펙이탈 검증 ──────────────────────────────────
  const _dIssues=[];
  const _dE=DAILY_EQUIP[curEquip];
  if(_dE&&_dE.items){
    const _dM=getTabMonth('daily');
    const _dRK=`${_dM.year}_${_dM.month}_${curDay}_${curEquip}`;
    const _dDd=_dResults[_dRK]||{};
    _dE.items.forEach(item=>{
      const _rd=_dDd[item.no]||{};
      const _val=_rd.result||'';
      const _std=item.std||'';
      if(!_val){
        _dIssues.push({type:'empty',name:item.name||`항목 ${item.no}`,std:_std});
      } else if(_dIsNumericStd(_std)){
        if(_dCheckInRange(parseFloat(_val),_std)===false)
          _dIssues.push({type:'outofspec',name:item.name||`항목 ${item.no}`,val:_val,std:_std});
      } else if(_val==='✕'){
        _dIssues.push({type:'outofspec',name:item.name||`항목 ${item.no}`,val:'✕',std:_std});
      }
    });
  }
  // ────────────────────────────────────────────────────────
  const _doSave=async()=>{
    clearTimeout(_dSaveTimer);
    const btn=document.getElementById('d-save-btn');
    if(btn){btn.disabled=true;btn.textContent='저장 중…';}
    window.showSaving && window.showSaving();
    const _saved=await _dFlushResults(true);
    window.hideSaving && window.hideSaving();
    if(btn){btn.disabled=false;btn.textContent='저장';}
    if(_saved===false) return;
    window.showToast && window.showToast('점검 결과 저장 완료', 'success');
    const _sm=getTabMonth('daily');
    _dHasDBData.add(`${curEquip}_${curDay}_${_sm.year}_${_sm.month}`);
    _dSetReadOnly(true);
    renderCheckTable();
  };
  if(_dIssues.length>0&&typeof window._showSpecWarnModal==='function'){
    window._showSpecWarnModal(_dIssues,_doSave); return;
  }
  await _doSave();
};
function _dSetReadOnly(flag) {
  _dReadOnly = flag;
  const saveBtn = document.getElementById('d-save-btn');
  const editBtn = document.getElementById('d-edit-result-btn');
  if (saveBtn) saveBtn.style.display = flag ? 'none' : '';
  if (editBtn) editBtn.style.display = flag ? '' : 'none';
  const wi = document.getElementById('d-worker-input');
  const vi = document.getElementById('d-verifier-input');
  if (wi) { wi.disabled = flag; wi.style.color = flag ? 'rgba(255,255,255,.4)' : '#fff'; }

  if(m){
    const equipDbId2=parseInt(m[1]), itemNo=m[2], rawField=m[3];

    const _dItemKey2=`${equipDbId2}_${itemNo}`;

          <div id="d-alarm-modal-body"></div>
        </div>
        <div style="padding:12px 20px;border-top:1px solid #e2e8f0;text-align:right">
          <button onclick="document.getElementById('${OVERLAY_ID}').style.display='none'" style="padding:8px 22px;background:#e53e3e;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">확인</button>
        </div>
      </div>`;
    document.body.appendChild(el);
  }

  window._dShowAlarmBlockModal = function(violations) {
    _ensureModal();
    const rows = violations.map(v => `
      <tr>
        <td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px">${v.equip_name||''}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px">${v.item_name||''}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px">${v.result||''}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px;color:#718096">${v.standard||''}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px;color:#c53030;font-weight:600;white-space:nowrap">${v.issue||''}</td>
      </tr>`).join('');
    document.getElementById('d-alarm-modal-body').innerHTML = `
      <table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0">
        <thead><tr style="background:#edf2f7">
          <th style="padding:7px 10px;text-align:left;font-size:12px;font-weight:600">설비</th>
          <th style="padding:7px 10px;text-align:left;font-size:12px;font-weight:600">항목</th>
          <th style="padding:7px 10px;text-align:left;font-size:12px;font-weight:600">입력값</th>
          <th style="padding:7px 10px;text-align:left;font-size:12px;font-weight:600">기준</th>
          <th style="padding:7px 10px;text-align:left;font-size:12px;font-weight:600">판정</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    document.getElementById(OVERLAY_ID).style.display = 'flex';
  };
})();
</script>
