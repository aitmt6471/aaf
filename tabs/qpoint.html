<!-- Q-Point (고객품질불량) -->
<div class="tab-toolbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:15px;font-weight:900;color:#c9302d;letter-spacing:2px">Q-Point</span>
    <div style="width:1px;height:16px;background:var(--border)"></div>
    <span id="qp-count-badge" style="font-size:11px;font-weight:600;color:#6b7280">0건</span>
  </div>
  <div style="flex:1"></div>
  <button class="btn btn-ghost btn-sm" onclick="qpOpenCurrentApproval()">결재</button>
  <select id="qp-filter-status" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-family:inherit;cursor:pointer" onchange="qpRenderList()">
    <option value="">전체</option>
    <option value="active">진행중</option>
    <option value="v1done">1차완료</option>
    <option value="v2done">2차완료</option>
    <option value="completed">완료</option>
  </select>
  <button id="qp-new-btn" class="btn btn-sm" style="background:#c9302d;color:#fff;display:none" onclick="qpNewForm()">＋ 새 Q-Point</button>
  <button class="btn btn-ghost btn-sm" onclick="window.print_qpoint && window.print_qpoint()">🖨 인쇄</button>
  <button id="qp-edit-btn" class="btn btn-ghost btn-sm" onclick="qpToggleEditMode(this)">&#x270F; 편집 모드</button>
</div>

<!-- 2-panel 레이아웃 -->

  <!-- 좌측 목록 -->
  <div id="qp-list-panel" style="width:320px;min-width:280px;border-right:2px solid #e2e8f0;overflow-y:auto;background:#fff;flex-shrink:0">
    <div id="qp-list-body">
      <div style="padding:40px 20px;text-align:center;color:#9ca3af;font-size:12px">Q-Point가 없습니다</div>

  </div>

  <!-- 우측 상세 -->

        <div style="font-size:40px;margin-bottom:14px">⚠</div>
        <div style="font-size:13px;font-weight:600;color:#6b7280">목록에서 항목을 선택하거나 새 Q-Point를 추가하세요</div>
      </div>

</div>

<script>
(function(){
'use strict';

var LS_KEY   = 'qpoints_v1';
var _list    = [];
var _selId   = null;
var _editMode = false;

window.qpToggleEditMode = function(btn){
  if(!_editMode){
    var pw = prompt('편집 모드 비밀번호를 입력하세요');
    if(pw !== 'ait1234'){
      if(typeof showToast==='function') showToast('비밀번호가 올바르지 않습니다','error');
      return;
    }
    _editMode = true;
    btn.textContent = '읽기 모드';
    btn.style.background = '#c9302d';
    btn.style.color = '#fff';
  } else {
    _editMode = false;
    btn.innerHTML = '&#x270F; 편집 모드';
    btn.style.background = '';
    btn.style.color = '';
  }
  var nb = document.getElementById('qp-new-btn');
  if(nb) nb.style.display = _editMode ? '' : 'none';
  if(_selId) renderDetail(_selId);
};

/* ── 상수 ── */
var STATUS_LABEL = {active:'진행중', v1done:'1차 완료', v2done:'2차 완료', completed:'완료'};
var STATUS_COLOR = {active:'#f97316', v1done:'#3b82f6', v2done:'#8b5cf6', completed:'#16a34a'};
var STATUS_BG    = {active:'#fff7ed', v1done:'#eff6ff', v2done:'#f5f3ff', completed:'#f0fdf4'};

/* ── 유틸 ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function today(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function compressImage(file,cb){
  var img=new Image();
  var url=URL.createObjectURL(file);
  img.onload=function(){
    var MAX=800, w=img.width, h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    var c=document.createElement('canvas');
    c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    cb(c.toDataURL('image/jpeg',0.7));
  };
  img.src=url;
}

/* ── 데이터 ── */
function load(){
  if(typeof AIT_API!=='undefined' && !AIT_API.MOCK && window.currentCarId){
    AIT_API.getQpointList(window.currentCarId).then(function(list){
      _list=Array.isArray(list)?list:[];
      try{localStorage.setItem(LS_KEY,JSON.stringify(_list));}catch(e){}
      renderList();
      if(_selId) renderDetail(_selId);
    }).catch(function(){
      try{_list=JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){_list=[];}
      renderList();
      if(_selId) renderDetail(_selId);
    });
    return;
  }
  try{_list=JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){_list=[];}
  renderList();
  if(_selId) renderDetail(_selId);
}

function save(){
  try{ localStorage.setItem(LS_KEY,JSON.stringify(_list)); }
  catch(e){ if(typeof showToast==='function') showToast('저장 실패 (용량 초과)','error'); }
}

window._qpSyncToDb=function(){
  if(!window.currentCarId) return Promise.reject(new Error('차종 미선택'));
  return AIT_API.saveQpointList(window.currentCarId,_list);
};

window.qpLoad=load;

function findQ(id){
  for(var i=0;i<_list.length;i++){ if(_list[i].id===id) return _list[i]; }
  return null;
}

function defaultValidity(){
  return [
    {check_no:1,date:'',result:'',checker:'',done:false},
    {check_no:2,date:'',result:'',checker:'',done:false},
    {check_no:3,date:'',result:'',checker:'',done:false}
  ];
}

function defaultSigners(){
  return [{name:'',sign_img:''},{name:'',sign_img:''},{name:'',sign_img:''}];
}

function _extractFileId(url){
  if(!url||url.indexOf('data:')===0) return '';
  var m=url.match(/\/d\/([^/?#\s]+)/);
  return m?m[1]:'';
}

function _driveReplace(docType, oldImg, base64, filename, onDone){
  var oldId=_extractFileId(oldImg);
  var doUpload=function(){
    AIT_API.uploadSignSimple(docType,base64,filename).then(function(r){
      onDone(r&&r.fileId?`https://drive.google.com/thumbnail?id=${r.fileId}&sz=w400`:null);
    }).catch(function(e){ console.warn('서명 업로드 실패',e); onDone(null); });
  };
  if(oldId){
    AIT_API.deleteSignFile(oldId).then(doUpload,doUpload);
  } else {
    doUpload();
  }
}

function calcStatus(q){
  var v=q.validity||[];
  if(v[2]&&v[2].done) return 'completed';
  if(v[1]&&v[1].done) return 'v2done';
  if(v[0]&&v[0].done) return 'v1done';
  return 'active';
}

/* ── 목록 렌더 ── */
function renderList(){
  var body=document.getElementById('qp-list-body'); if(!body) return;
  var badge=document.getElementById('qp-count-badge'); if(badge) badge.textContent=_list.length+'건';
  var filterEl=document.getElementById('qp-filter-status');
  var filterStatus=filterEl?filterEl.value:'';

  var filtered=[];
  for(var i=0;i<_list.length;i++){
    var s=calcStatus(_list[i]);
    if(!filterStatus||s===filterStatus) filtered.push(_list[i]);
  }
  filtered.sort(function(a,b){ return (b.issue_date||'').localeCompare(a.issue_date||''); });

  if(!filtered.length){
    body.innerHTML='<div style="padding:40px 16px;text-align:center;color:#9ca3af;font-size:12px">'
      +(filterStatus?'"'+STATUS_LABEL[filterStatus]+'" 항목이 없습니다':'등록된 Q-Point가 없습니다')
      +'</div>';
    return;
  }

  var html='';
  for(var j=0;j<filtered.length;j++){
    var q=filtered[j];
    var s=calcStatus(q);
    var isSel=q.id===_selId;
    var validCount=0;
    var v=q.validity||[];
    for(var k=0;k<v.length;k++){ if(v[k].done) validCount++; }
    var vColor=validCount>0?STATUS_COLOR[s]:'#d1d5db';
    html+='<div onclick="qpRenderDetail(\''+q.id+'\')" style="padding:12px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;background:'+(isSel?'#fff4f4':'#fff')+';border-left:3px solid '+(isSel?'#c9302d':'transparent')+';transition:background .15s">'
      +'<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">'
      +'<span style="background:'+STATUS_BG[s]+';color:'+STATUS_COLOR[s]+';font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:1px">'+STATUS_LABEL[s]+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:#111827;line-height:1.4;flex:1">'+esc(q.title||'(제목 없음)')+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;font-size:10px;color:#9ca3af">'
      +'<span style="font-weight:600;color:#6b7280;font-family:monospace">'+esc(q.doc_no||'-')+'</span>'
      +'<span>|</span>'
      +'<span>'+esc(q.issue_date||'-')+'</span>'
      +'<span>|</span>'
      +'<span>'+esc(q.car_model||'-')+'</span>'
      +'<div style="flex:1"></div>'
      +'<span style="color:'+vColor+';font-weight:600">✓ '+validCount+'/3차</span>'
      +'</div>'
      +'</div>';
  }
  body.innerHTML=html;
}

/* ── 상세 렌더 ── */
function renderDetail(id){
  _selId=id;
  renderList();
  var q=findQ(id); if(!q) return;
  var body=document.getElementById('qp-detail-body'); if(!body) return;
  var s=calcStatus(q);
  var validity=q.validity||defaultValidity();
  var sc=STATUS_COLOR[s];
  var sb=STATUS_BG[s];
  var eMode=_editMode;

  /* 준수사항 */
  var actions=q.actions||[];
  var actionsHtml='';
  for(var ai=0;ai<actions.length;ai++){
    actionsHtml+='<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f0f4f8">'

/* ── 전역 노출 ── */
window.qpRenderList=function(){ renderList(); };
window.qpRenderDetail=function(id){ renderDetail(id); };

window.qpFieldInput=function(id,field,el){
  var q=findQ(id); if(!q) return;
  q[field]=el.innerText.trim();
  save();
  if(field==='title'||field==='issue_date'||field==='car_model') renderList();
};

window.qpActionInput=function(id,idx,el){
  var q=findQ(id); if(!q||!q.actions) return;
  q.actions[idx]=el.innerText.trim(); save();
};

window.qpAddAction=function(id){
  var q=findQ(id); if(!q) return;
  if(!q.actions) q.actions=[];
  q.actions.push(''); save(); renderDetail(id);
};

window.qpDeleteAction=function(id,idx){
  var q=findQ(id); if(!q||!q.actions) return;
  q.actions.splice(idx,1); save(); renderDetail(id);
};

window.qpValidityInput=function(id,idx,field,val){
  var q=findQ(id); if(!q) return;
  if(!q.validity) q.validity=defaultValidity();
  q.validity[idx][field]=val; save();
};

window.qpToggleValidity=function(id,idx){
  var q=findQ(id); if(!q) return;
  if(!q.validity) q.validity=defaultValidity();
  q.validity[idx].done=!q.validity[idx].done;
  if(q.validity[idx].done && !q.validity[idx].date) q.validity[idx].date=today();
  save(); renderDetail(id); renderList();
};

window.qpApvInput=function(id,role,val){
  var q=findQ(id); if(!q) return;
  if(!q.approval) q.approval={};
  q.approval[role]=val; save();
};

window.qpSign=function(id,role){
  var q=findQ(id); if(!q) return;
  if(!q.approval) q.approval={};
  if(!q.approval[role]){ if(typeof showToast==='function') showToast('이름을 먼저 입력하세요','error'); return; }
  q.approval[role+'_signed']=true; save(); renderDetail(id);
};

window.qpUnsign=function(id,role){
  var q=findQ(id); if(!q) return;
  if(!q.approval) return;
  q.approval[role+'_signed']=false;
  delete q.approval[role+'_sign_img'];
  save();
  _renderApprovalBody(q);
  renderDetail(id);
};

window.qpOpenSign=function(id,role){
  var q=findQ(id); if(!q) return;
  var labels={writer:'작  성',reviewer:'검  토',approver:'승  인'};
  var nm=(q.approval&&q.approval[role])||'';
  if(typeof openSignModalWith==='function'){
    openSignModalWith('Q-Point 서명 — '+(labels[role]||role), nm, function(name,base64){
      if(!q.approval) q.approval={};
      q.approval[role]=name;
      q.approval[role+'_sign_img']=base64;
      q.approval[role+'_signed']=true;
      save();
      _renderApprovalBody(q);
      renderDetail(id);
    });
  }
};

window.qpUploadPhoto=function(id,input){
  var q=findQ(id); if(!q) return;
  var file=input.files[0]; if(!file) return;
  compressImage(file,function(data){ q.problem_photo=data; save(); renderDetail(id); });
};

window.qpDelete=function(id){
  if(!confirm('이 Q-Point를 삭제하시겠습니까?')) return;
  var newList=[];
  for(var i=0;i<_list.length;i++){ if(_list[i].id!==id) newList.push(_list[i]); }
  _list=newList; save();
  _selId=null;
  renderList();
  var body=document.getElementById('qp-detail-body');
  if(body) body.innerHTML='<div style="padding:80px 20px;text-align:center;color:#9ca3af">'
    +'<div style="font-size:40px;margin-bottom:14px">⚠</div>'
    +'<div style="font-size:13px;font-weight:600;color:#6b7280">목록에서 항목을 선택하세요</div>'
    +'</div>';
};

/* ── 새 Q-Point 모달 ── */
window.qpNewForm=function(){
  var t=today();
  var el;
  el=document.getElementById('qp-f-issue-date'); if(el) el.value=t;
  var autoNo=t.replace(/-/g,'').slice(2)+'-AIT-'+String(_list.length+1).padStart(2,'0');
  el=document.getElementById('qp-f-doc-no'); if(el) el.value=autoNo;
  var clearIds=['qp-f-title','qp-f-part-name','qp-f-part-no','qp-f-car-model','qp-f-plant','qp-f-lot','qp-f-qty','qp-f-dept','qp-f-detail'];
  for(var i=0;i<clearIds.length;i++){
    el=document.getElementById(clearIds[i]); if(el) el.value='';
  }
  document.getElementById('qp-new-modal').classList.add('open');
  setTimeout(function(){ var f=document.getElementById('qp-f-title'); if(f) f.focus(); }, 100);
};

window.qpCloseNewModal=function(){
  document.getElementById('qp-new-modal').classList.remove('open');
};

window.qpSubmitNew=function(){
  var titleEl=document.getElementById('qp-f-title');
  var docNoEl=document.getElementById('qp-f-doc-no');
  var title=(titleEl?titleEl.value:'').trim();
  var docNo=(docNoEl?docNoEl.value:'').trim();
  if(!title){ if(typeof showToast==='function') showToast('내용(불량 제목)을 입력하세요','error'); return; }
  if(!docNo){ if(typeof showToast==='function') showToast('문서번호를 입력하세요','error'); return; }
  function gv(eid){ var e=document.getElementById(eid); return e?e.value:''; }
  var q={
    id:uid(),
    doc_no:docNo,
    issue_date:gv('qp-f-issue-date')||today(),
    title:title,
    part_name:gv('qp-f-part-name'),
    part_no:gv('qp-f-part-no'),
    car_model:gv('qp-f-car-model'),
    plant:gv('qp-f-plant'),
    lot_no:gv('qp-f-lot'),
    qty:gv('qp-f-qty'),
    dept:gv('qp-f-dept'),
    detail:gv('qp-f-detail'),
    problem_photo:'',
    actions:[],
    validity:defaultValidity(),
    approval:{},
    signers:defaultSigners()
  };
  _list.unshift(q); save();
  qpCloseNewModal();
  renderList();
  renderDetail(q.id);
  if(typeof showToast==='function') showToast('Q-Point 등록 완료','success');
};

/* ── 유효성 점검 모달 ── */
var _qpvmId=null, _qpvmIdx=null;
var STATUS_COLOR_LOCAL={active:'#f97316',v1done:'#3b82f6',v2done:'#8b5cf6',completed:'#16a34a'};

function _renderValiditySteps(q,selIdx){
  var validity=q.validity||defaultValidity();
  var s=calcStatus(q);
  var sc=STATUS_COLOR_LOCAL[s]||'#374151';
  var html='<div style="display:flex;align-items:center">';
  for(var i=0;i<validity.length;i++){
    var vv=validity[i];
    var isDone=vv.done;
    var isSel=i===selIdx;
    var borderC=isDone?sc:(isSel?'#374151':'#d1d5db');
    var bgC=isDone?sc:(isSel?'#f1f5f9':'#fff');
    var textC=isDone?'#fff':(isSel?'#374151':'#9ca3af');
    html+='<div style="flex:1;text-align:center">'
      +'<div onclick="qpSelectValidityRow(\''+q.id+'\','+i+')" style="width:40px;height:40px;border-radius:50%;border:2px solid '+borderC+';background:'+bgC+';color:'+textC+';font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;cursor:pointer;transition:all .2s">'+(isDone?'✓':(i+1))+'</div>'
      +'<div style="font-size:11px;font-weight:600;color:'+(isDone?sc:(isSel?'#374151':'#9ca3af'))+'">'+(i+1)+'차 점검</div>'
      +(isDone&&vv.date?'<div style="font-size:10px;color:#6b7280;margin-top:2px">'+esc(vv.date)+'</div>':'')
      +'</div>';
    if(i<2){
      var nextDone=validity[i+1]&&validity[i+1].done;
      html+='<div style="height:2px;background:'+(nextDone?sc:'#e5e7eb')+';flex:0 0 40px;margin-bottom:20px;border-radius:1px"></div>';
    }
  }
  html+='</div>';
  var el=document.getElementById('qpvm-steps');
  if(el) el.innerHTML=html;
}

function _renderValiditySummary(q,selIdx){
  var validity=q.validity||defaultValidity();
  var s=calcStatus(q);
  var sc=STATUS_COLOR_LOCAL[s]||'#374151';
  var rows='';
  for(var i=0;i<validity.length;i++){
    var vr=validity[i];
    var isSel=i===selIdx;
    rows+='<tr style="cursor:pointer;background:'+(isSel?'#f0f9ff':'#fff')+';border-left:3px solid '+(isSel?sc:'transparent')+'" onclick="qpSelectValidityRow(\''+q.id+'\','+i+')">'
      +'<td style="padding:8px 12px;text-align:center;font-weight:700;color:'+sc+'">'+(i+1)+'차</td>'

function _initApprovalCanvases(q){
  var roles=['writer','reviewer','approver'];
  if(!q.approval) q.approval={};
  for(var ci=0;ci<roles.length;ci++){
    (function(idx, roleKey){
      var canvas=document.getElementById('qp-apv-canvas-'+idx);
      if(!canvas) return;
      var ctx=canvas.getContext('2d');
      ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
      var si=q.approval[roleKey+'_sign_img'];
      if(si){
        var img=new Image();
        img.onload=function(){ ctx.drawImage(img,0,0,canvas.width,canvas.height); };
        img.src=si;
      }
      var drawing=false;
      function getPos(e){
        var rect=canvas.getBoundingClientRect();
        var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
        var src=e.touches?e.touches[0]:e;
        return {x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy};
      }
      function onStart(e){ e.preventDefault(); drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
      function onMove(e){ if(!drawing) return; e.preventDefault(); var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }
      function onEnd(e){
        if(!drawing) return; drawing=false;
        var b64=canvas.toDataURL('image/png');
        var oldImg=q.approval[roleKey+'_sign_img']||'';
        q.approval[roleKey+'_sign_img']=b64;
        q.approval[roleKey+'_signed']=true; save();
        if(typeof AIT_API!=='undefined'&&!AIT_API.MOCK){
          var sc=(window.currentCar||q.car_model||'').replace(/[^a-zA-Z0-9가-힣]/g,'_').slice(0,15)||'qp';
          var df=(q.title||'').replace(/[^a-zA-Z0-9가-힣]/g,'_').slice(0,15)||'sign';
          var rs={writer:'01',reviewer:'02',approver:'03'};
          var fn=sc+'-'+df+'-'+(rs[roleKey]||'01')+'.png';
          _driveReplace('qpoint',oldImg,b64,fn,function(url){
            if(url){ q.approval[roleKey+'_sign_img']=url; save(); }
          });
        }
      }
      canvas.addEventListener('mousedown',onStart);
      canvas.addEventListener('mousemove',onMove);
      canvas.addEventListener('mouseup',onEnd);
      canvas.addEventListener('mouseleave',function(e){ if(drawing) onEnd(e); });
      canvas.addEventListener('touchstart',onStart,{passive:false});
      canvas.addEventListener('touchmove',onMove,{passive:false});
      canvas.addEventListener('touchend',onEnd);
    })(ci, roles[ci]);
  }
}
