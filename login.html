<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 공정문서 관리시스템</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
    }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      padding: 24px;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 110px;
      margin-bottom: 14px;
    }

    .logo-wrap h1 {
      color: #1e293b;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .logo-wrap p {
      color: #64748b;
      font-size: 12px;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-group { margin-bottom: 14px; }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: #1e293b;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #94a3b8; }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: #1d4ed8;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-login:hover { background: #1e40af; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .footer-txt {
      color: #94a3b8;
      font-size: 12px;
      text-align: center;
    }

    /* 로딩 스피너 */
    .btn-login.loading {
      position: relative;
      color: transparent;
    }
    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 18px; height: 18px;
      margin: -9px 0 0 -9px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-wrap">
      <img src="ait-logo.png" alt="AIT">
      <h1>공정문서 관리시스템</h1>
      <p>AIT · People With Positive Energy</p>
    </div>

    <div class="divider"></div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="email">아이디 (이메일)</label>
        <input id="email" type="email" placeholder="example@ait.com" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      </div>
      <button class="btn-login" type="submit" id="loginBtn">로그인</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <div class="footer-txt">© 2026 AIT. All rights reserved.</div>
</div>

<script>
  const API = 'https://aitechn8n.ngrok.app/webhook';

  (function() {
    const token = localStorage.getItem('ait_token');
    const exp   = parseInt(localStorage.getItem('ait_token_exp') || '0');
    if (token && exp > Date.now()) window.location.replace('index.html');
    else if (token) {
      localStorage.removeItem('ait_token');
      localStorage.removeItem('ait_token_exp');
      localStorage.removeItem('ait_user');
    }
  })();

  async function doLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.classList.add('loading');
    errEl.classList.remove('visible');

    try {
      const res = await fetch(`${API}/ait/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('ait_token', data.token);
        localStorage.setItem('ait_token_exp', String(data.exp || (Date.now() + 8 * 3600 * 1000)));
        localStorage.setItem('ait_user', JSON.stringify({
          name:       data.name,
          email:      data.email,
          department: data.department,
          role:       data.role
        }));
        window.location.replace('index.html');
      } else {
        showError(data.message || '아이디 또는 비밀번호가 올바르지 않습니다.');
      }
    } catch {
      showError('서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
